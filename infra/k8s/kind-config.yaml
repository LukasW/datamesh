# kind cluster configuration for the Datamesh platform
# Usage: kind create cluster --config kind-config.yaml --name datamesh
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  # K8s >=1.33 node images no longer ship iptables – use nftables
  kubeProxyMode: nftables
nodes:
  - role: control-plane
    labels:
      ingress-ready: "true"
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # NGINX Ingress Controller (all HTTP services)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Non-HTTP: Kafka external listener (TCP)
      - containerPort: 30092
        hostPort: 9092
        protocol: TCP
      # Non-HTTP: gRPC premium calculation (TCP)
      - containerPort: 30181
        hostPort: 9181
        protocol: TCP
      # Non-HTTP: OTLP gRPC for local dev tracing
      - containerPort: 30317
        hostPort: 4317
        protocol: TCP
