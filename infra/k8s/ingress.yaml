# ── NGINX Ingress – all HTTP services via *.localhost ────────────────────────
# No /etc/hosts needed: *.localhost resolves to 127.0.0.1 on macOS & modern Linux.

# ═══════════════════════════════════════════════════════════
# Domain Services
# ═══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: domain-services
  namespace: datamesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx
  rules:
    - host: partner.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: partner-service
                port:
                  number: 9080
    - host: product.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 9081
    - host: policy.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: policy-service
                port:
                  number: 9082
    - host: claims.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claims-service
                port:
                  number: 9083
    - host: billing.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 9084
    - host: hr.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hr-system
                port:
                  number: 9085
    - host: hr-integration.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hr-integration
                port:
                  number: 9086
---
# ═══════════════════════════════════════════════════════════
# Infrastructure & Governance UIs
# ═══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infrastructure
  namespace: datamesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    # Security
    - host: keycloak.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
    # Messaging
    - host: akhq.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: akhq
                port:
                  number: 8080
    - host: schema-registry.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: schema-registry
                port:
                  number: 8081
    - host: debezium.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: debezium-connect
                port:
                  number: 8083
    # Lakehouse
    - host: trino.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trino
                port:
                  number: 8086
    - host: minio.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
    - host: minio-api.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
    - host: nessie.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nessie
                port:
                  number: 19120
    # Governance
    - host: openmetadata.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openmetadata-server
                port:
                  number: 8585
    - host: superset.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: superset
                port:
                  number: 8088
    - host: marquez.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marquez-web
                port:
                  number: 3000
    - host: vault.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
    # Observability
    - host: grafana.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: prometheus.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    - host: jaeger.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
---
# ═══════════════════════════════════════════════════════════
# OTLP HTTP (for browser-based tracing export)
# ═══════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otlp-http
  namespace: datamesh
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: otlp.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 4318
