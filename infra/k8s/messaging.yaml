# ── Kafka (KRaft mode), Schema Registry, AKHQ, Debezium Connect ──────────────

# ═══════════════════════════════════════════════════════════
# Kafka (KRaft – no Zookeeper)
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: datamesh
spec:
  selector:
    app: kafka
  ports:
    - name: internal
      port: 29092
      targetPort: 29092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: datamesh
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
      nodePort: 30092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: datamesh
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.9.2
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_LOG_DIRS
              value: /tmp/kraft-combined-logs
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: CLUSTER_ID
              value: MkU3OEVBNTcwNTJENDM2Qk
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 29092
            - containerPort: 9092
            - containerPort: 9093
          readinessProbe:
            exec:
              command: ["bash", "-c", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            limits:
              memory: 1Gi
---
# ═══════════════════════════════════════════════════════════
# Schema Registry
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: datamesh
spec:
  selector:
    app: schema-registry
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      enableServiceLinks: false
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.9.2
          imagePullPolicy: IfNotPresent
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: schema-registry
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: SCHEMA_REGISTRY_LISTENERS
              value: http://0.0.0.0:8081
            - name: SCHEMA_REGISTRY_HEAP_OPTS
              value: "-Xms128m -Xmx128m"
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 256Mi
---
# ═══════════════════════════════════════════════════════════
# AKHQ (Kafka UI)
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: akhq
  namespace: datamesh
spec:
  selector:
    app: akhq
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: akhq
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akhq
  template:
    metadata:
      labels:
        app: akhq
    spec:
      containers:
        - name: akhq
          image: tchiotludo/akhq:0.25.2
          imagePullPolicy: IfNotPresent
          env:
            - name: AKHQ_CONFIGURATION
              value: |
                akhq:
                  connections:
                    datamesh:
                      properties:
                        bootstrap.servers: "kafka:29092"
                      schema-registry:
                        url: "http://schema-registry:8081"
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 256Mi
---
# ═══════════════════════════════════════════════════════════
# Debezium Connect
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: debezium-connect
  namespace: datamesh
spec:
  selector:
    app: debezium-connect
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-connect
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debezium-connect
  template:
    metadata:
      labels:
        app: debezium-connect
    spec:
      containers:
        - name: debezium
          image: yuno/debezium-connect:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              until nc -z kafka 29092 2>/dev/null; do echo 'Waiting for Kafka TCP…'; sleep 2; done
              /etc/confluent/docker/configure && exec /etc/confluent/docker/launch
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: CONNECT_GROUP_ID
              value: debezium-partner
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: debezium.configs
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: debezium.offsets
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: debezium.statuses
            - name: CONNECT_KEY_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: CONNECT_VALUE_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: CONNECT_REST_PORT
              value: "8083"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: debezium-connect
            - name: CONNECT_PLUGIN_PATH
              value: /usr/share/java,/usr/share/confluent-hub-components
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256M -Xmx1024M"
            - name: CONNECT_CONFIG_PROVIDERS
              value: env
            - name: CONNECT_CONFIG_PROVIDERS_ENV_CLASS
              value: org.apache.kafka.common.config.provider.EnvVarConfigProvider
            - name: CONNECT_CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY
              value: All
            - name: PARTNER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: partner-db-password
            - name: PRODUCT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: product-db-password
            - name: POLICY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: policy-db-password
            - name: BILLING_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: billing-db-password
            - name: CLAIMS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: claims-db-password
            # AWS SDK region for Iceberg Sink S3 client (MinIO)
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              value: minioadmin
            - name: AWS_SECRET_ACCESS_KEY
              value: minioadmin
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 1280Mi
