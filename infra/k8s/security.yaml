# ── Keycloak (OIDC) + Vault (Crypto-Shredding ADR-009) ───────────────────────

# ═══════════════════════════════════════════════════════════
# Keycloak
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: datamesh
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.2
          imagePullPolicy: IfNotPresent
          command: ["/opt/keycloak/bin/kc.sh"]
          args: ["start-dev", "--import-realm", "--health-enabled=true"]
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-config
                  key: admin-password
            - name: KC_HOSTNAME
              value: keycloak.localhost
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              memory: 512Mi
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
---
# ═══════════════════════════════════════════════════════════
# Vault (Dev mode for crypto-shredding)
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: datamesh
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault
          imagePullPolicy: IfNotPresent
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: vault-config
                  key: vault-token
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          ports:
            - containerPort: 8200
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              memory: 256Mi
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
