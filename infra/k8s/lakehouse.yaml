# ── MinIO, Nessie, Trino ─────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════
# MinIO (S3-compatible Object Store)
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: datamesh
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: datamesh
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio
          imagePullPolicy: IfNotPresent
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - containerPort: 9000
            - containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# ═══════════════════════════════════════════════════════════
# Nessie (Git-like Iceberg Catalog)
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: nessie
  namespace: datamesh
spec:
  selector:
    app: nessie
  ports:
    - port: 19120
      targetPort: 19120
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nessie
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nessie
  template:
    metadata:
      labels:
        app: nessie
    spec:
      containers:
        - name: nessie
          image: projectnessie/nessie:0.76.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NESSIE_VERSION_STORE_TYPE
              value: JDBC
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://nessie-db:5432/nessie
            - name: QUARKUS_DATASOURCE_USERNAME
              value: nessie
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: nessie
          ports:
            - containerPort: 19120
          readinessProbe:
            httpGet:
              path: /api/v2/config
              port: 19120
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              memory: 256Mi
---
# ═══════════════════════════════════════════════════════════
# Trino (Distributed SQL on Iceberg)
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: datamesh
spec:
  selector:
    app: trino
  ports:
    - port: 8086
      targetPort: 8086
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
  template:
    metadata:
      labels:
        app: trino
    spec:
      containers:
        - name: trino
          image: yuno/trino:local
          imagePullPolicy: IfNotPresent
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-config
                  key: vault-token
          ports:
            - containerPort: 8086
          readinessProbe:
            httpGet:
              path: /v1/info
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 1536Mi
          volumeMounts:
            - name: trino-config
              mountPath: /etc/trino/config.properties
              subPath: config.properties
            - name: trino-config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: trino-config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: trino-config
              mountPath: /etc/trino/log.properties
              subPath: log.properties
            - name: trino-catalog
              mountPath: /etc/trino/catalog/iceberg.properties
              subPath: iceberg.properties
      volumes:
        - name: trino-config
          configMap:
            name: trino-config
        - name: trino-catalog
          configMap:
            name: trino-catalog
