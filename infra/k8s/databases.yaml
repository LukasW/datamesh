# ── Domain Databases (PostgreSQL 16 with logical replication) ─────────────────
# partner-db, product-db, policy-db, claims-db, billing-db, hr-db
# ── Infrastructure Databases ─────────────────────────────────────────────────
# superset-db, openmetadata-db, marquez-db

# ── Helper template: each DB is a StatefulSet + headless Service ─────────────

# ═══════════════════════════════════════════════════════════
# partner-db
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: partner-db
  namespace: datamesh
spec:
  clusterIP: None
  selector:
    app: partner-db
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: partner-db
  namespace: datamesh
spec:
  serviceName: partner-db
  replicas: 1
  selector:
    matchLabels:
      app: partner-db
  template:
    metadata:
      labels:
        app: partner-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          args: ["-c", "wal_level=logical", "-c", "max_replication_slots=5", "-c", "max_wal_senders=5"]
          env:
            - name: POSTGRES_DB
              value: partner_db
            - name: POSTGRES_USER
              value: partner_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: partner-db-password
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "partner_user", "-d", "partner_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
