# ═══════════════════════════════════════════════════════════
# openmetadata-db (shared by OpenMetadata + Airflow)
# ═══════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: openmetadata-db
  namespace: datamesh
spec:
  clusterIP: None
  selector:
    app: openmetadata-db
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openmetadata-db
  namespace: datamesh
spec:
  serviceName: openmetadata-db
  replicas: 1
  selector:
    matchLabels:
      app: openmetadata-db
  template:
    metadata:
      labels:
        app: openmetadata-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: openmetadata
            - name: POSTGRES_USER
              value: openmetadata
            - name: POSTGRES_PASSWORD
              value: openmetadata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "openmetadata", "-d", "openmetadata"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-sql
          configMap:
            name: openmetadata-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
