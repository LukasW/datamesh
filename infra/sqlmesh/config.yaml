gateways:
  trino:
    connection:
      type: trino
      host: trino
      port: 8086
      catalog: iceberg
      user: sqlmesh
      http_scheme: http
    state_connection:
      type: duckdb
      database: /state/sqlmesh_state.db

default_gateway: trino

# Iceberg Nessie catalogs do not support CREATE VIEW (Trino limitation), which
# breaks SQLMesh's default virtual layer for the prod environment. `dev_only`
# bypasses the virtual layer in prod — model tables are written directly to
# their target schema, while dev environments still use the virtual layer.
virtual_environment_mode: dev_only

model_defaults:
  dialect: trino
  start: "2024-01-01"

# ── Backfill Strategy ────────────────────────────────────────────────────────
#
# Silver models use INCREMENTAL_BY_UNIQUE_KEY (entity-state) or
# INCREMENTAL_BY_TIME_RANGE (append-only). On first deployment, SQLMesh
# backfills from model_defaults.start (2024-01-01) to now in hourly/daily
# intervals matching each model's cron.
#
# To trigger a full backfill for a specific model after schema changes:
#   sqlmesh plan --restate-model <schema>.<model>
#
# To backfill a specific date range:
#   sqlmesh plan --start 2024-06-01 --end 2024-06-30
#
# Gold models remain kind FULL and are rebuilt entirely on each cron tick,
# reading from the incrementally maintained silver tables.
#
# Cron schedule overview:
#   */5 * * * *  — partner, policy, invoice (high-traffic operational, dev feedback)
#   @hourly      — claim, coverage (operational)
#   @hourly      — claim_detail, policy_detail, partner_decrypted, portfolio_summary (gold)
#   @daily       — product, employee, org_unit, address (reference data)
#   @daily       — financial_summary, management_kpi, org_hierarchy (reporting)
