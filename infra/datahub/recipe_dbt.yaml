# DataHub Ingestion Recipe – dbt
#
# Reads dbt manifest.json and catalog.json after a dbt run and publishes
# model metadata, column-level lineage, and test results to DataHub.
#
# Usage (run after dbt build):
#   pip install acryl-datahub[dbt]
#   datahub ingest -c infra/datahub/recipe_dbt.yaml
#
# Generate dbt artifacts first:
#   cd infra/dbt && dbt docs generate

source:
  type: dbt
  config:
    manifest_path: "infra/dbt/target/manifest.json"
    catalog_path:  "infra/dbt/target/catalog.json"
    target_platform: postgres
    target_platform_instance: platform-db
    write_semantics: OVERRIDE
    node_name_pattern:
      allow:
        - ".*"

sink:
  type: datahub-rest
  config:
    server: "http://localhost:8080"
