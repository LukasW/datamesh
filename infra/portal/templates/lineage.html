{% extends "base.html" %}
{% block content %}
<h2 class="mb-1">Data Lineage</h2>
<p class="text-muted mb-3">Vollständige Datenherkunft über alle Domänen des Mesh</p>

<div class="card shadow-sm mb-3">
  <div class="card-body p-0">
    <svg id="lineage-graph" width="100%" height="640" style="background:#f8f9fa;display:block;"></svg>
  </div>
</div>

<!-- Legend -->
<div class="d-flex flex-wrap gap-3 small mb-2">
  <span><svg width="16" height="16"><rect width="16" height="16" rx="3" fill="#6c757d"/></svg> Database (Data Inside)</span>
  <span><svg width="16" height="16"><rect width="16" height="16" rx="3" fill="#6f42c1"/></svg> Service</span>
  <span><svg width="16" height="16"><rect width="16" height="16" rx="3" fill="#0d6efd"/></svg> Kafka Topic (Data Outside)</span>
  <span><svg width="16" height="16"><rect width="16" height="16" rx="3" fill="#fd7e14"/></svg> Raw Table</span>
  <span><svg width="16" height="16"><rect width="16" height="16" rx="3" fill="#20c997"/></svg> Staging (dbt)</span>
  <span><svg width="16" height="16"><rect width="16" height="16" rx="3" fill="#198754"/></svg> Mart (dbt)</span>
</div>
<div class="d-flex flex-wrap gap-3 small">
  <span><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" stroke="#6c757d" stroke-width="2" stroke-dasharray="4,3"/></svg> Outbox/CDC</span>
  <span><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" stroke="#0d6efd" stroke-width="2"/></svg> Kafka consume</span>
  <span><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" stroke="#198754" stroke-width="2"/></svg> dbt transform</span>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const nodes = {{ nodes_json | safe }};
const edges = {{ edges_json | safe }};

const colorMap = {
  database: "#6c757d",
  service:  "#6f42c1",
  topic:    "#0d6efd",
  raw:      "#fd7e14",
  staging:  "#20c997",
  mart:     "#198754",
};
const edgeColor = { outbox: "#6c757d", direct: "#6f42c1", kafka: "#0d6efd", dbt: "#198754" };
const edgeDash  = { outbox: "6,4", direct: "2,3", kafka: "none", dbt: "none" };

const svg = d3.select("#lineage-graph");
const W = svg.node().getBoundingClientRect().width;
const H = 640;

svg.append("defs").append("marker")
  .attr("id","arrow").attr("viewBox","0 -5 10 10")
  .attr("refX",18).attr("refY",0)
  .attr("markerWidth",6).attr("markerHeight",6)
  .attr("orient","auto")
  .append("path").attr("d","M0,-5L10,0L0,5").attr("fill","#999");

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(edges).id(d => d.id).distance(120))
  .force("charge", d3.forceManyBody().strength(-350))
  .force("center", d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide(50));

const link = svg.append("g").selectAll("line")
  .data(edges).join("line")
  .attr("stroke", d => edgeColor[d.type] || "#999")
  .attr("stroke-width", 1.8)
  .attr("stroke-dasharray", d => edgeDash[d.type] || "none")
  .attr("marker-end","url(#arrow)");

const node = svg.append("g").selectAll("g")
  .data(nodes).join("g")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end",   (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

node.append("rect")
  .attr("rx",5).attr("ry",5)
  .attr("width", d => Math.max(d.id.length * 7.5, 80))
  .attr("height", 28)
  .attr("x", d => -Math.max(d.id.length * 7.5, 80) / 2)
  .attr("y", -14)
  .attr("fill", d => colorMap[d.type] || "#aaa")
  .attr("opacity", 0.9);

node.append("text")
  .attr("text-anchor","middle").attr("dy","0.35em")
  .attr("fill","#fff").attr("font-size",11)
  .attr("font-family","monospace")
  .text(d => d.id);

node.append("title").text(d => `${d.id} (${d.type})`);

sim.on("tick", () => {
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
});
</script>
{% endblock %}
