<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSS Data Mesh Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --css-navy: #1a3a5c; --css-blue: #0d6efd; }
    .navbar { background-color: var(--css-navy) !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #90c8f0 !important; }
    .nav-link.active { font-weight: 600; border-bottom: 2px solid #90c8f0; }
    body { background: #f8f9fa; }
    .badge-pii { background-color: #dc3545; }
    .badge-gdpr { background-color: #fd7e14; }
    footer { background-color: var(--css-navy); color: #adb5bd; font-size: .85rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">⬡ Data Mesh Portal</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Datenprodukte</a></li>
        <li class="nav-item"><a class="nav-link" href="/lineage">Lineage</a></li>
        <li class="nav-item"><a class="nav-link" href="/governance">Governance</a></li>
        <li class="nav-item"><a class="nav-link" href="/demo">Demo</a></li>
        <li class="nav-item"><a class="nav-link" href="/report">Portfolio-Bericht</a></li>
        <li class="nav-item"><a class="nav-link" href="/management-report">Management-Report</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid py-4">
  {% block content %}{% endblock %}
</main>

<footer class="py-3 mt-5">
  <div class="container text-center">
    CSS Sachversicherung – Data Mesh Platform Prototype &nbsp;|&nbsp;
    <a href="http://localhost:8085" class="text-info" target="_blank">AKHQ</a> &nbsp;|&nbsp;
    <a href="http://localhost:8081" class="text-info" target="_blank">Schema Registry</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
