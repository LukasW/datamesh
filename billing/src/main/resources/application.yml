quarkus:
  application:
    name: billing-service
    version: 1.0.0

  http:
    port: 9084
    auth:
      permission:
        public:
          paths: /q/*,/swagger-ui/*,/openapi
          policy: permit
        authenticated:
          paths: /*
          policy: authenticated

  smallrye-openapi:
    info-title: Billing & Collection Service API
    info-version: 1.0.0
    info-description: REST API für Fakturierung und Mahnwesen (Hexagonal Architecture)
    info-contact-name: Yuno Team
    path: /openapi

  swagger-ui:
    always-include: true
    path: /swagger-ui

  datasource:
    db-kind: postgresql

  hibernate-orm:
    schema-management:
      strategy: none # Use Flyway for migrations

  hibernate-envers:
    store-data-at-delete: true
    audit-table-suffix: _aud
    revision-field-name: rev
    revision-type-field-name: rev_type

  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    schemas: public
    table: flyway_schema_history
    locations: classpath:db/migration

  virtual-threads:
    enabled: true

  oidc:
    auth-server-url: http://localhost:8180/realms/yuno
    client-id: billing-service
    credentials:
      secret: secret
    application-type: hybrid
    roles:
      role-claim-path: realm_access/roles

  log:
    level: INFO

"%prod":
  quarkus:
    datasource:
      db-version: "12.0"
      username: ${DATABASE_USER}
      password: ${DATABASE_PASSWORD}
      jdbc:
        url: ${DATABASE_URL}
    oidc:
      auth-server-url: ${KEYCLOAK_URL}/realms/yuno
      client-id: billing-service
      credentials:
        secret: ${OIDC_CLIENT_SECRET}
