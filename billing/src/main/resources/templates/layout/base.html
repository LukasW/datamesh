<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{#insert title}Fakturierung{/insert} – CSS Sachversicherung</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    .badge-OPEN     { background-color: #0d6efd; color: #fff; }
    .badge-PAID     { background-color: #198754; color: #fff; }
    .badge-OVERDUE  { background-color: #dc3545; color: #fff; }
    .badge-CANCELLED{ background-color: #6c757d; color: #fff; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/billing">Fakturierung &amp; Mahnwesen</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/swagger-ui">Swagger UI</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container-fluid px-4">
  {#insert content /}
</div>
<div id="modal-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    var el = evt.target.querySelector('.modal');
    if (el) { new bootstrap.Modal(el).show(); }
  });
</script>
</body>
</html>
