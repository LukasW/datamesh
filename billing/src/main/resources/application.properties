# ── Kafka bootstrap (prod profile only) ──────────────────────────────────────
%prod.mp.messaging.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}

# ── Incoming channels ─────────────────────────────────────────────────────────
mp.messaging.incoming.policy-issued-in.connector=smallrye-kafka
mp.messaging.incoming.policy-issued-in.topic=policy.v1.issued
mp.messaging.incoming.policy-issued-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.policy-issued-in.group.id=billing-service-policy
mp.messaging.incoming.policy-issued-in.auto.offset.reset=earliest
mp.messaging.incoming.policy-issued-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.policy-issued-in.dead-letter-queue.topic=billing-policy-issued-dlq

mp.messaging.incoming.policy-cancelled-in.connector=smallrye-kafka
mp.messaging.incoming.policy-cancelled-in.topic=policy.v1.cancelled
mp.messaging.incoming.policy-cancelled-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.policy-cancelled-in.group.id=billing-service-policy
mp.messaging.incoming.policy-cancelled-in.auto.offset.reset=earliest
mp.messaging.incoming.policy-cancelled-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.policy-cancelled-in.dead-letter-queue.topic=billing-policy-cancelled-dlq

mp.messaging.incoming.partner-state-in.connector=smallrye-kafka
mp.messaging.incoming.partner-state-in.topic=person.v1.state
mp.messaging.incoming.partner-state-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.partner-state-in.group.id=billing-service-partner
mp.messaging.incoming.partner-state-in.auto.offset.reset=earliest

mp.messaging.incoming.claims-settled-in.connector=smallrye-kafka
mp.messaging.incoming.claims-settled-in.topic=claims.v1.settled
mp.messaging.incoming.claims-settled-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.claims-settled-in.group.id=billing-service-claims
mp.messaging.incoming.claims-settled-in.auto.offset.reset=earliest
mp.messaging.incoming.claims-settled-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.claims-settled-in.dead-letter-queue.topic=billing-claims-settled-dlq

# ── OpenLineage (data lineage to Marquez) ────────────────────────────────────
%prod.openlineage.url=${OPENLINEAGE_URL:http://marquez:5050}
