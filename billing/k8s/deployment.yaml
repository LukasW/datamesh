apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: datamesh
spec:
  selector:
    app: billing-service
  ports:
    - port: 9084
      targetPort: 9084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: yuno/billing-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QUARKUS_PROFILE
              value: prod
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: DATABASE_URL
              value: jdbc:postgresql://billing-db:5432/billing_db
            - name: DATABASE_USER
              value: billing_user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: billing-db-password
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_FRONTEND_URL
              value: http://keycloak.localhost
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-config
                  key: oidc-client-secret
            - name: OPENLINEAGE_URL
              value: http://marquez:5050
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4317
          ports:
            - containerPort: 9084
          readinessProbe:
            httpGet:
              path: /q/metrics
              port: 9084
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 384Mi
