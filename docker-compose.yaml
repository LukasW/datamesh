services:

  # Kafka mit KRaft (kein Zookeeper nötig ab Confluent 7.x)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  akhq:
    image: tchiotludo/akhq:0.25.1
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "8085:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            datamesh:
              properties:
                bootstrap.servers: "kafka:29092"
              schema-registry:
                url: "http://schema-registry:8081"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  partner-db:
    image: postgres:16
    restart: unless-stopped
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: partner_db
      POSTGRES_USER: partner_user
      POSTGRES_PASSWORD: ${PARTNER_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partner_user -d partner_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - partner-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  debezium-connect:
    build:
      context: infra/debezium
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      partner-db:
        condition: service_healthy
      product-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_GROUP_ID: debezium-partner
      CONNECT_CONFIG_STORAGE_TOPIC: debezium.configs
      CONNECT_OFFSET_STORAGE_TOPIC: debezium.offsets
      CONNECT_STATUS_STORAGE_TOPIC: debezium.statuses
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium-connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx768M"
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      PARTNER_DB_PASSWORD: ${PARTNER_DB_PASSWORD}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  debezium-init:
    image: curlimages/curl:latest
    depends_on:
      debezium-connect:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://debezium-connect:8083/connectors; do
          echo 'Debezium not ready yet, retrying in 3s...'
          sleep 3
        done
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/partner-outbox-connector.json \
          && echo 'Partner connector registered.' \
          || echo 'Partner connector registration failed (may already exist).'
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/product-outbox-connector.json \
          && echo 'Product connector registered.' \
          || echo 'Product connector registration failed (may already exist).'
    volumes:
      - ./infra/debezium/partner-outbox-connector.json:/config/partner-outbox-connector.json
      - ./infra/debezium/product-outbox-connector.json:/config/product-outbox-connector.json
    networks:
      - backend

  product-db:
    image: postgres:16
    restart: unless-stopped
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  policy-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: policy_user
      POSTGRES_PASSWORD: ${POLICY_DB_PASSWORD}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy_user -d policy_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - policy-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  partner-service:
    image: lukasweibel/person-service:latest
    pull_policy: never
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      partner-db:
        condition: service_healthy
    ports:
      - "9080:9080"
      - "5005:5005"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://partner-db:5432/partner_db
      DATABASE_USER: partner_user
      DATABASE_PASSWORD: ${PARTNER_DB_PASSWORD}
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  product-service:
    image: lukasweibel/product-service:latest
    pull_policy: never
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      product-db:
        condition: service_healthy
    ports:
      - "9081:9081"
      - "5006:5006"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://product-db:5432/product_db
      DATABASE_USER: product_user
      DATABASE_PASSWORD: ${PRODUCT_DB_PASSWORD}
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  policy-service:
    image: lukasweibel/policy-service:latest
    pull_policy: never
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      policy-db:
        condition: service_healthy
    ports:
      - "9082:9082"
      - "5007:5007"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://policy-db:5432/policy_db
      DATABASE_USER: policy_user
      DATABASE_PASSWORD: ${POLICY_DB_PASSWORD}
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

volumes:
  partner-db-data:
  product-db-data:
  policy-db-data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
