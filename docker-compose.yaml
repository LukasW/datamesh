services:

  # Kafka mit KRaft (kein Zookeeper nötig ab Confluent 7.x, KRaft dynamic controllers ab 7.9)
  kafka:
    image: confluentinc/cp-kafka:7.9.2
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1500M

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.2
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  schema-registry-init:
    image: python:3.12-slim
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./scripts/register-schemas.sh:/opt/register-schemas.sh:ro
      - ./partner/src/main/resources/contracts/schemas:/opt/partner/src/main/resources/contracts/schemas:ro
      - ./product/src/main/resources/contracts/schemas:/opt/product/src/main/resources/contracts/schemas:ro
      - ./policy/src/main/resources/contracts/schemas:/opt/policy/src/main/resources/contracts/schemas:ro
      - ./claims/src/main/resources/contracts/schemas:/opt/claims/src/main/resources/contracts/schemas:ro
      - ./billing/src/main/resources/contracts/schemas:/opt/billing/src/main/resources/contracts/schemas:ro
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    entrypoint: ["bash", "-c", "apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1; cd /opt && bash register-schemas.sh"]
    restart: "no"
    networks:
      - backend

  akhq:
    image: tchiotludo/akhq:0.25.1
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "8085:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            datamesh:
              properties:
                bootstrap.servers: "kafka:29092"
              schema-registry:
                url: "http://schema-registry:8081"
        micronaut:
          security:
            token:
              jwt:
                signatures:
                  secret:
                    generator:
                      secret: "${AKHQ_JWT_SECRET:-changeme-at-least-256-bits-long-secret}"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8280
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "false"
    ports:
      - "8280:8080"
    volumes:
      - ./infra/keycloak/yuno-realm.json:/opt/keycloak/data/import/yuno-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  partner-db:
    image: postgres:17
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: partner_db
      POSTGRES_USER: partner_user
      POSTGRES_PASSWORD: ${PARTNER_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partner_user -d partner_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - partner-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  kafka-init:
    image: confluentinc/cp-kafka:7.9.2
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic debezium.configs \
          --partitions 1 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          && echo 'debezium.configs topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic debezium.offsets \
          --partitions 1 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          && echo 'debezium.offsets topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic debezium.statuses \
          --partitions 1 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          && echo 'debezium.statuses topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic person.v1.state \
          --partitions 6 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.cleanable.dirty.ratio=0.01 \
          --config segment.ms=10000 \
          && echo 'person.v1.state topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic partner-person-created-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'partner-person-created-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic partner-person-updated-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'partner-person-updated-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product-defined-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'product-defined-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product-updated-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'product-updated-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product-deprecated-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'product-deprecated-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product.v1.state \
          --partitions 6 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.cleanable.dirty.ratio=0.01 \
          --config segment.ms=10000 \
          && echo 'product.v1.state topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic billing.v1.invoice-created \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'billing.v1.invoice-created topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic billing.v1.payment-received \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'billing.v1.payment-received topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic billing.v1.dunning-initiated \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'billing.v1.dunning-initiated topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic billing.v1.payout-triggered \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'billing.v1.payout-triggered topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic billing-policy-issued-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'billing-policy-issued-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic billing-policy-cancelled-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'billing-policy-cancelled-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic claims.v1.opened \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'claims.v1.opened topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic claims.v1.settled \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'claims.v1.settled topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic billing-claims-settled-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'billing-claims-settled-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic hr.v1.employee.state \
          --partitions 6 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.cleanable.dirty.ratio=0.01 \
          --config segment.ms=10000 \
          && echo 'hr.v1.employee.state topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic hr.v1.employee.changed \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'hr.v1.employee.changed topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic hr.v1.org-unit.state \
          --partitions 6 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.cleanable.dirty.ratio=0.01 \
          --config segment.ms=10000 \
          && echo 'hr.v1.org-unit.state topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic hr.v1.org-unit.changed \
          --partitions 6 \
          --replication-factor 1 \
          && echo 'hr.v1.org-unit.changed topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic hr-integration-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'hr-integration-dlq topic created.'
        # sales.v1.offer-created        – New offer created for a prospective policyholder
        # sales.v1.offer-accepted       – Offer accepted, triggers policy creation
        # sales.v1.offer-rejected       – Offer explicitly rejected by customer
        # sales.v1.offer-expired        – Offer validity period elapsed
    networks:
      - backend

  debezium-connect:
    build:
      context: infra/debezium
      dockerfile: Dockerfile
    restart: unless-stopped
    # Skip Confluent's cub kafka-ready preflight (fails under Podman DNS even when
    # Kafka is healthy). depends_on: service_healthy already guarantees Kafka is up.
    # configure: transforms CONNECT_* env vars → properties file
    # launch:    starts the Connect worker (skips the ensure/preflight step)
    # Wait for TCP reachability to guard against Podman DNS race on fresh networks.
    command: ["/bin/bash", "-c", "until nc -z kafka 29092 2>/dev/null; do echo 'Waiting for Kafka TCP…'; sleep 2; done && /etc/confluent/docker/configure && exec /etc/confluent/docker/launch"]
    depends_on:
      kafka:
        condition: service_healthy
      partner-db:
        condition: service_healthy
      product-db:
        condition: service_healthy
      policy-db:
        condition: service_healthy
      billing-db:
        condition: service_healthy
      claims-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_GROUP_ID: debezium-partner
      CONNECT_CONFIG_STORAGE_TOPIC: debezium.configs
      CONNECT_OFFSET_STORAGE_TOPIC: debezium.offsets
      CONNECT_STATUS_STORAGE_TOPIC: debezium.statuses
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium-connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx768M"
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      CONNECT_CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY: All
      PARTNER_DB_PASSWORD: ${PARTNER_DB_PASSWORD}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POLICY_DB_PASSWORD: ${POLICY_DB_PASSWORD}
      BILLING_DB_PASSWORD: ${BILLING_DB_PASSWORD}
      CLAIMS_DB_PASSWORD: ${CLAIMS_DB_PASSWORD}
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1500M

  debezium-init:
    image: curlimages/curl:latest
    depends_on:
      debezium-connect:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://debezium-connect:8083/connectors; do
          echo 'Debezium not ready yet, retrying in 3s...'
          sleep 3
        done
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/partner-outbox-connector.json \
          && echo 'Partner connector registered.' \
          || echo 'Partner connector registration failed (may already exist).'
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/product-outbox-connector.json \
          && echo 'Product connector registered.' \
          || echo 'Product connector registration failed (may already exist).'
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/policy-outbox-connector.json \
          && echo 'Policy connector registered.' \
          || echo 'Policy connector registration failed (may already exist).'
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/billing-outbox-connector.json \
          && echo 'Billing connector registered.' \
          || echo 'Billing connector registration failed (may already exist).'
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/claims-outbox-connector.json \
          && echo 'Claims connector registered.' \
          || echo 'Claims connector registration failed (may already exist).'
    volumes:
      - ./infra/debezium/partner-outbox-connector.json:/config/partner-outbox-connector.json
      - ./infra/debezium/product-outbox-connector.json:/config/product-outbox-connector.json
      - ./infra/debezium/policy-outbox-connector.json:/config/policy-outbox-connector.json
      - ./infra/debezium/billing-outbox-connector.json:/config/billing-outbox-connector.json
      - ./infra/debezium/claims-outbox-connector.json:/config/claims-outbox-connector.json
    networks:
      - backend

  product-db:
    image: postgres:17
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  policy-db:
    image: postgres:17
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: policy_user
      POSTGRES_PASSWORD: ${POLICY_DB_PASSWORD}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy_user -d policy_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - policy-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  partner-service:
    image: ${IMAGE_REGISTRY:-yuno}/partner-service:${IMAGE_TAG:-latest}
    pull_policy: never
    depends_on:
      kafka:
        condition: service_healthy
      partner-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      vault:
        condition: service_healthy
    ports:
      - "9080:9080"
      - "5005:5005"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://partner-db:5432/partner_db
      DATABASE_USER: partner_user
      DATABASE_PASSWORD: ${PARTNER_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_FRONTEND_URL: http://localhost:8280
      OIDC_CLIENT_SECRET: secret
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  product-service:
    image: ${IMAGE_REGISTRY:-yuno}/product-service:${IMAGE_TAG:-latest}
    pull_policy: never
    depends_on:
      kafka:
        condition: service_healthy
      product-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "9081:9081"
      - "9181:9181"
      - "5006:5006"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://product-db:5432/product_db
      DATABASE_USER: product_user
      DATABASE_PASSWORD: ${PRODUCT_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_FRONTEND_URL: http://localhost:8280
      OIDC_CLIENT_SECRET: secret
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  policy-service:
    image: ${IMAGE_REGISTRY:-yuno}/policy-service:${IMAGE_TAG:-latest}
    pull_policy: never
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      policy-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "9082:9082"
      - "5007:5007"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      DATABASE_URL: jdbc:postgresql://policy-db:5432/policy_db
      DATABASE_USER: policy_user
      DATABASE_PASSWORD: ${POLICY_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_FRONTEND_URL: http://localhost:8280
      OIDC_CLIENT_SECRET: secret
      GRPC_PREMIUM_HOST: product-service
      GRPC_PREMIUM_PORT: "9181"
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  claims-service:
    image: ${IMAGE_REGISTRY:-yuno}/claims-service:${IMAGE_TAG:-latest}
    pull_policy: never
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      claims-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      debezium-connect:
        condition: service_healthy
      policy-service:
        condition: service_started
      vault:
        condition: service_healthy
    ports:
      - "9083:9083"
      - "5008:5008"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://claims-db:5432/claims_db
      DATABASE_USER: claims_user
      DATABASE_PASSWORD: ${CLAIMS_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_FRONTEND_URL: http://localhost:8280
      OIDC_CLIENT_SECRET: secret
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-root-token
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5008"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  claims-db:
    image: postgres:17
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: claims_db
      POSTGRES_USER: claims_user
      POSTGRES_PASSWORD: ${CLAIMS_DB_PASSWORD}
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims_user -d claims_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - claims-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  billing-db:
    image: postgres:17
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: ${BILLING_DB_PASSWORD}
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  billing-service:
    image: ${IMAGE_REGISTRY:-yuno}/billing-service:${IMAGE_TAG:-latest}
    pull_policy: never
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      billing-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      debezium-connect:
        condition: service_healthy
    ports:
      - "9084:9084"
      - "5009:5009"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://billing-db:5432/billing_db
      DATABASE_USER: billing_user
      DATABASE_PASSWORD: ${BILLING_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_FRONTEND_URL: http://localhost:8280
      OIDC_CLIENT_SECRET: secret
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5009"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── HR System (COTS Stub) + Integration ────────────────────────────────────

  hr-db:
    image: postgres:17
    environment:
      POSTGRES_DB: hr_db
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: ${HR_DB_PASSWORD:-hr_password}
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hr-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  hr-system:
    image: ${IMAGE_REGISTRY:-yuno}/hr-system:${IMAGE_TAG:-latest}
    pull_policy: never
    depends_on:
      hr-db:
        condition: service_healthy
    ports:
      - "9085:9085"
      - "5010:5010"
    environment:
      QUARKUS_PROFILE: prod
      DATABASE_URL: jdbc:postgresql://hr-db:5432/hr_db
      DATABASE_USER: hr_user
      DATABASE_PASSWORD: ${HR_DB_PASSWORD:-hr_password}
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5010"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  hr-integration:
    image: ${IMAGE_REGISTRY:-yuno}/hr-integration:${IMAGE_TAG:-latest}
    pull_policy: never
    depends_on:
      kafka:
        condition: service_healthy
      hr-system:
        condition: service_started
    ports:
      - "9086:9086"
      - "5011:5011"
    environment:
      QUARKUS_PROFILE: prod
      HR_ODATA_BASE_URL: http://hr-system:9085/odata
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5011"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Observability (Prometheus + Grafana) ─────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:12.4.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  jaeger:
    image: jaegertracing/jaeger:2.16.0
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ══════════════════════════════════════════════════════════════════════════════
  # ── Phase 1: Lakehouse Foundation ───────────────────────────────────────────
  # ══════════════════════════════════════════════════════════════════════════════

  # ── MinIO (S3-compatible Object Store for Iceberg Parquet files) ────────────

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/warehouse --ignore-existing
        echo "MinIO bucket 'warehouse' ready."
    networks:
      - backend

  # ── Nessie (Git-like Iceberg Catalog) ──────────────────────────────────────

  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.4
    restart: unless-stopped
    ports:
      - "19120:19120"
    environment:
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      NESSIE_VERSION_STORE_PERSIST_ROCKS_DATABASE_PATH: /nessie/data
      QUARKUS_OTEL_ENABLED: "false"
    volumes:
      - nessie-data:/nessie/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/api/v2/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Trino (Distributed SQL Query Engine on Iceberg) ────────────────────────

  trino:
    image: trinodb/trino:474
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
      vault:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    volumes:
      - ./infra/trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./infra/trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./infra/trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./infra/trino/etc/log.properties:/etc/trino/log.properties:ro
      - ./infra/trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
      - ./infra/trino/vault-udf/target/trino-vault-decrypt-1.0.0-SNAPSHOT:/usr/lib/trino/plugin/vault-decrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ── Apache Superset (Self-Service BI on Trino) ─────────────────────────────

  superset-db:
    image: postgres:17
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  superset-init:
    build:
      context: infra/superset
      dockerfile: Dockerfile
    image: yuno/superset:local
    depends_on:
      superset-db:
        condition: service_healthy
      trino:
        condition: service_healthy
    restart: "no"
    environment:
      SUPERSET_SECRET_KEY: datamesh-dev-secret-change-in-prod
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://superset:superset@superset-db:5432/superset"
    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./infra/superset/superset-init.sh:/init.sh:ro
    command: bash /init.sh
    networks:
      - backend

  superset:
    build:
      context: infra/superset
      dockerfile: Dockerfile
    image: yuno/superset:local
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: datamesh-dev-secret-change-in-prod
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://superset:superset@superset-db:5432/superset"
    command: superset run -h 0.0.0.0 -p 8088
    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ── Iceberg Sink Connectors (registered via debezium-init) ─────────────────
  # The Iceberg Sink Connector plugin is installed in the debezium-connect
  # Dockerfile. Connector configs are registered by iceberg-init below.

  iceberg-init:
    image: curlimages/curl:latest
    depends_on:
      debezium-connect:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://debezium-connect:8083/connectors; do
          echo 'Debezium not ready yet, retrying in 3s...'
          sleep 3
        done
        for config in /config/iceberg-sinks/*/*.json; do
          name=$$(basename "$$config" .json)
          code=$$(curl -s -o /tmp/resp -w '%{http_code}' -X POST http://debezium-connect:8083/connectors \
            -H 'Content-Type: application/json' \
            -d @"$$config")
          case "$$code" in
            201|200) echo "$$name registered.";;
            409)     echo "$$name already exists (409, skipping).";;
            *)       echo "$$name registration failed (HTTP $$code):"; cat /tmp/resp; echo;;
          esac
        done
    volumes:
      - ./partner/data-product/debezium/iceberg-sinks:/config/iceberg-sinks/partner:ro
      - ./product/data-product/debezium/iceberg-sinks:/config/iceberg-sinks/product:ro
      - ./policy/data-product/debezium/iceberg-sinks:/config/iceberg-sinks/policy:ro
      - ./billing/data-product/debezium/iceberg-sinks:/config/iceberg-sinks/billing:ro
      - ./claims/data-product/debezium/iceberg-sinks:/config/iceberg-sinks/claims:ro
      - ./hr-system/data-product/debezium/iceberg-sinks:/config/iceberg-sinks/hr-system:ro
    networks:
      - backend

  # ── Transform Init (Silver & Gold tables via Trino CTAS) ──────────────────
  transform-init:
    image: python:3.12-alpine
    depends_on:
      trino:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools
    entrypoint: ["python3", "/scripts/transform-init.py"]
    volumes:
      - ./infra/trino/transform-init.py:/scripts/transform-init.py:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ══════════════════════════════════════════════════════════════════════════════
  # ── Phase 2: Transformation Layer (SQLMesh) ────────────────────────────────
  # ══════════════════════════════════════════════════════════════════════════════

  sqlmesh:
    build:
      context: .
      dockerfile: infra/sqlmesh/Dockerfile
    restart: "no"
    profiles:
      - tools
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./infra/sqlmesh/config.yaml:/sqlmesh/config.yaml:ro
      # Domain-owned silver models
      - ./partner/data-product/sqlmesh/silver:/sqlmesh/models/silver/partner:ro
      - ./product/data-product/sqlmesh/silver:/sqlmesh/models/silver/product:ro
      - ./policy/data-product/sqlmesh/silver:/sqlmesh/models/silver/policy:ro
      - ./billing/data-product/sqlmesh/silver:/sqlmesh/models/silver/billing:ro
      - ./claims/data-product/sqlmesh/silver:/sqlmesh/models/silver/claims:ro
      - ./hr-system/data-product/sqlmesh/silver:/sqlmesh/models/silver/hr:ro
      # Domain-owned gold models
      - ./partner/data-product/sqlmesh/gold:/sqlmesh/models/gold/partner:ro
      - ./policy/data-product/sqlmesh/gold:/sqlmesh/models/gold/policy:ro
      - ./billing/data-product/sqlmesh/gold:/sqlmesh/models/gold/billing:ro
      - ./claims/data-product/sqlmesh/gold:/sqlmesh/models/gold/claims:ro
      - ./hr-system/data-product/sqlmesh/gold:/sqlmesh/models/gold/hr:ro
      # Cross-domain analytics (central)
      - ./infra/sqlmesh/models/gold/analytics:/sqlmesh/models/gold/analytics:ro
      # Audits & tests
      - ./policy/data-product/sqlmesh/audits:/sqlmesh/audits:ro
      - ./hr-system/data-product/sqlmesh/tests:/sqlmesh/models/tests:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ══════════════════════════════════════════════════════════════════════════════
  # ── Phase 3: Governance & Compliance ───────────────────────────────────────
  # ══════════════════════════════════════════════════════════════════════════════

  # ── OpenMetadata (Unified Metadata Catalog) ────────────────────────────────

  openmetadata-db:
    image: postgres:17
    environment:
      POSTGRES_DB: openmetadata
      POSTGRES_USER: openmetadata
      POSTGRES_PASSWORD: openmetadata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmetadata -d openmetadata"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - openmetadata-db-data:/var/lib/postgresql/data
      - ./infra/openmetadata/init-airflow-db.sql:/docker-entrypoint-initdb.d/init-airflow-db.sql:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  openmetadata-elasticsearch:
    image: opensearchproject/opensearch:2.19.0
    platform: linux/amd64
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_INSTALL_DEMO_CONFIG=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=0s' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    ports:
      - "9200:9200"
    volumes:
      - openmetadata-esdata:/usr/share/elasticsearch/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G

  openmetadata-migrate:
    image: openmetadata/server:1.12.4
    depends_on:
      openmetadata-db:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/openmetadata/bootstrap/openmetadata-ops.sh migrate
    environment:
      OPENMETADATA_CLUSTER_NAME: datamesh
      SEARCH_TYPE: opensearch
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_HOST: openmetadata-db
      DB_PORT: "5432"
      DB_USER: openmetadata
      DB_USER_PASSWORD: openmetadata
      OM_DATABASE: openmetadata
      ELASTICSEARCH_HOST: openmetadata-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
    networks:
      - backend

  openmetadata-server:
    image: openmetadata/server:1.12.4
    restart: unless-stopped
    depends_on:
      openmetadata-db:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8585:8585"
    environment:
      OPENMETADATA_CLUSTER_NAME: datamesh
      SEARCH_TYPE: opensearch
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_HOST: openmetadata-db
      DB_PORT: "5432"
      DB_USER: openmetadata
      DB_USER_PASSWORD: openmetadata
      OM_DATABASE: openmetadata
      ELASTICSEARCH_HOST: openmetadata-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://openmetadata-ingestion:8080
      SERVER_HOST_API_URL: http://openmetadata-server:8585/api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8586/healthcheck || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  openmetadata-ingestion:
    image: openmetadata/ingestion:1.12.4
    restart: unless-stopped
    depends_on:
      openmetadata-server:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        airflow db migrate
        airflow users create --username admin --firstname Admin --lastname Admin \
          --email admin@yuno.ch --role Admin --password admin 2>/dev/null || true
        airflow scheduler &
        SCHEDULER_PID=$$!
        airflow api-server --port 8080 &
        WEBSERVER_PID=$$!
        trap "kill $$SCHEDULER_PID $$WEBSERVER_PID 2>/dev/null; exit" SIGTERM SIGINT
        wait -n
        kill $$SCHEDULER_PID $$WEBSERVER_PID 2>/dev/null
        exit 1
    environment:
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__API__WORKERS: "2"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://openmetadata:openmetadata@openmetadata-db:5432/airflow"
    volumes:
      - ./infra/openmetadata/kafka-ingestion.json:/config/kafka-ingestion.json:ro
      - ./infra/openmetadata/trino-ingestion.json:/config/trino-ingestion.json:ro
      - ./infra/openmetadata/pii-classification.json:/config/pii-classification.json:ro
      - ./infra/openmetadata/odc-ingestion.json:/config/odc-ingestion.json:ro
      - ./partner/src/main/resources/contracts:/contracts/partner:ro
      - ./product/src/main/resources/contracts:/contracts/product:ro
      - ./policy/src/main/resources/contracts:/contracts/policy:ro
      - ./billing/src/main/resources/contracts:/contracts/billing:ro
      - ./claims/src/main/resources/contracts:/contracts/claims:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G

  # ── HashiCorp Vault (Crypto-Shredding / ADR-009) ───────────────────────────

  vault:
    image: hashicorp/vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      SKIP_SETCAP: "true"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>/dev/null || wget -qO- http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  vault-init:
    image: hashicorp/vault
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        vault secrets enable transit 2>/dev/null || echo 'Transit engine already enabled.'
        echo 'Vault Transit engine ready for crypto-shredding (ADR-009).'
    networks:
      - backend

  # ── Soda Core (Data Quality / Contract Testing) ────────────────────────────

  soda-core:
    build:
      context: .
      dockerfile: infra/soda/Dockerfile
    restart: "no"
    profiles:
      - tools
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./infra/soda/configuration.yml:/soda/configuration.yml:ro
      - ./partner/data-product/soda/checks.yml:/soda/checks/partner.yml:ro
      - ./product/data-product/soda/checks.yml:/soda/checks/product.yml:ro
      - ./policy/data-product/soda/checks.yml:/soda/checks/policy.yml:ro
      - ./billing/data-product/soda/checks.yml:/soda/checks/billing.yml:ro
      - ./hr-system/data-product/soda/checks.yml:/soda/checks/hr.yml:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

