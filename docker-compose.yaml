services:

  # Kafka mit KRaft (kein Zookeeper nötig ab Confluent 7.x)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1500M

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  akhq:
    image: tchiotludo/akhq:0.25.1
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "8085:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            datamesh:
              properties:
                bootstrap.servers: "kafka:29092"
              schema-registry:
                url: "http://schema-registry:8081"
        micronaut:
          security:
            token:
              jwt:
                signatures:
                  secret:
                    generator:
                      secret: "${AKHQ_JWT_SECRET:-changeme-at-least-256-bits-long-secret}"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/css-realm.json:/opt/keycloak/data/import/css-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  partner-db:
    image: postgres:16
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: partner_db
      POSTGRES_USER: partner_user
      POSTGRES_PASSWORD: ${PARTNER_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partner_user -d partner_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - partner-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic person.v1.state \
          --partitions 6 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.cleanable.dirty.ratio=0.01 \
          --config segment.ms=10000 \
          && echo 'person.v1.state topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic partner-person-created-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'partner-person-created-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic partner-person-updated-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'partner-person-updated-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product-defined-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'product-defined-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product-updated-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'product-updated-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product-deprecated-dlq \
          --partitions 1 \
          --replication-factor 1 \
          && echo 'product-deprecated-dlq topic created.' \
        && kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic product.v1.state \
          --partitions 6 \
          --replication-factor 1 \
          --config cleanup.policy=compact \
          --config min.cleanable.dirty.ratio=0.01 \
          --config segment.ms=10000 \
          && echo 'product.v1.state topic created.'
        # ── Reserved topic namespaces (planned, not yet implemented) ──────────
        # billing.v1.invoice-created    – Invoice generated for a policy premium
        # billing.v1.payment-received   – Payment successfully allocated to an invoice
        # billing.v1.dunning-initiated  – Dunning process started for overdue invoice
        # billing.v1.payout-triggered   – Payout initiated for a settled claim
        # sales.v1.offer-created        – New offer created for a prospective policyholder
        # sales.v1.offer-accepted       – Offer accepted, triggers policy creation
        # sales.v1.offer-rejected       – Offer explicitly rejected by customer
        # sales.v1.offer-expired        – Offer validity period elapsed
    networks:
      - backend

  debezium-connect:
    build:
      context: infra/debezium
      dockerfile: Dockerfile
    restart: unless-stopped
    # Skip Confluent's cub kafka-ready preflight (fails under Podman DNS even when
    # Kafka is healthy). depends_on: service_healthy already guarantees Kafka is up.
    # configure: transforms CONNECT_* env vars → properties file
    # launch:    starts the Connect worker (skips the ensure/preflight step)
    # Wait for TCP reachability to guard against Podman DNS race on fresh networks.
    command: ["/bin/bash", "-c", "until nc -z kafka 29092 2>/dev/null; do echo 'Waiting for Kafka TCP…'; sleep 2; done && /etc/confluent/docker/configure && exec /etc/confluent/docker/launch"]
    depends_on:
      kafka:
        condition: service_healthy
      partner-db:
        condition: service_healthy
      product-db:
        condition: service_healthy
      policy-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_GROUP_ID: debezium-partner
      CONNECT_CONFIG_STORAGE_TOPIC: debezium.configs
      CONNECT_OFFSET_STORAGE_TOPIC: debezium.offsets
      CONNECT_STATUS_STORAGE_TOPIC: debezium.statuses
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium-connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx768M"
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      PARTNER_DB_PASSWORD: ${PARTNER_DB_PASSWORD}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POLICY_DB_PASSWORD: ${POLICY_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1500M

  debezium-init:
    image: curlimages/curl:latest
    depends_on:
      debezium-connect:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://debezium-connect:8083/connectors; do
          echo 'Debezium not ready yet, retrying in 3s...'
          sleep 3
        done
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/partner-outbox-connector.json \
          && echo 'Partner connector registered.' \
          || echo 'Partner connector registration failed (may already exist).'
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/product-outbox-connector.json \
          && echo 'Product connector registered.' \
          || echo 'Product connector registration failed (may already exist).'
        curl -f -X POST http://debezium-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/config/policy-outbox-connector.json \
          && echo 'Policy connector registered.' \
          || echo 'Policy connector registration failed (may already exist).'
    volumes:
      - ./infra/debezium/partner-outbox-connector.json:/config/partner-outbox-connector.json
      - ./infra/debezium/product-outbox-connector.json:/config/product-outbox-connector.json
      - ./infra/debezium/policy-outbox-connector.json:/config/policy-outbox-connector.json
    networks:
      - backend

  product-db:
    image: postgres:16
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  policy-db:
    image: postgres:16
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5
    environment:
      POSTGRES_DB: policy_db
      POSTGRES_USER: policy_user
      POSTGRES_PASSWORD: ${POLICY_DB_PASSWORD}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy_user -d policy_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - policy-db-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  partner-service:
    image: ${IMAGE_REGISTRY:-css}/partner-service:${IMAGE_TAG:-latest}
    pull_policy: never
    depends_on:
      kafka:
        condition: service_healthy
      partner-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "9080:9080"
      - "5005:5005"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://partner-db:5432/partner_db
      DATABASE_USER: partner_user
      DATABASE_PASSWORD: ${PARTNER_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      OIDC_CLIENT_SECRET: secret
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  product-service:
    image: ${IMAGE_REGISTRY:-css}/product-service:${IMAGE_TAG:-latest}
    pull_policy: never
    depends_on:
      kafka:
        condition: service_healthy
      product-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "9081:9081"
      - "5006:5006"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: jdbc:postgresql://product-db:5432/product_db
      DATABASE_USER: product_user
      DATABASE_PASSWORD: ${PRODUCT_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      OIDC_CLIENT_SECRET: secret
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  policy-service:
    image: ${IMAGE_REGISTRY:-css}/policy-service:${IMAGE_TAG:-latest}
    pull_policy: never
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      policy-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "9082:9082"
      - "5007:5007"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      DATABASE_URL: jdbc:postgresql://policy-db:5432/policy_db
      DATABASE_USER: policy_user
      DATABASE_PASSWORD: ${POLICY_DB_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      OIDC_CLIENT_SECRET: secret
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  claims-service:
    image: ${IMAGE_REGISTRY:-css}/claims-service:${IMAGE_TAG:-latest}
    pull_policy: never
    depends_on:
      kafka:
        condition: service_healthy
      policy-service:
        condition: service_started
    ports:
      - "9083:9083"
      - "5008:5008"
    environment:
      QUARKUS_PROFILE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5008"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Observability (Prometheus + Grafana) ─────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Platform Database (Analytics Layer) ──────────────────────────────────────

  platform-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: ${PLATFORM_DB_PASSWORD:-platform_pass}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - platform-db-data:/var/lib/postgresql/data
      - ./infra/platform/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  platform-consumer:
    build:
      context: infra/platform
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      platform-db:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUMER_GROUP_ID: platform-consumer
      PLATFORM_DB_URL: postgresql://platform_user:${PLATFORM_DB_PASSWORD:-platform_pass}@platform-db:5432/platform_db
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Apache Spark Data Platform ───────────────────────────────────────────────

  spark-streaming:
    build:
      context: infra/spark
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPARK_WAREHOUSE: /spark-warehouse
    volumes:
      - spark-warehouse:/spark-warehouse
      - spark-ivy2:/root/.ivy2
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  dbt:
    build:
      context: infra/dbt
      dockerfile: Dockerfile
    restart: "no"
    profiles:
      - tools
    depends_on:
      platform-db:
        condition: service_healthy
    environment:
      PLATFORM_DB_HOST: platform-db
      PLATFORM_DB_USER: platform_user
      PLATFORM_DB_PASSWORD: ${PLATFORM_DB_PASSWORD:-platform_pass}
      PLATFORM_DB_NAME: platform_db
    command: ["python3", "run_dbt.py"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ── Governance Layer ──────────────────────────────────────────────────────────

  governance:
    build:
      context: infra/governance
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      schema-registry:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    volumes:
      - ./partner/src/main/resources/contracts:/contracts/partner:ro
      - ./policy/src/main/resources/contracts:/contracts/policy:ro
      - ./product/src/main/resources/contracts:/contracts/product:ro
      - ./partner/src/main/resources/contracts:/avro/partner:ro
      - ./policy/src/main/resources/contracts:/avro/policy:ro
      - ./product/src/main/resources/contracts:/avro/product:ro
    command: >
      sh -c "python lint-contracts.py && bash schema-compat-check.sh && python check-freshness.py"
    networks:
      - backend

  # ── Data Product Portal ───────────────────────────────────────────────────────

  portal:
    build:
      context: infra/portal
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      schema-registry:
        condition: service_started
      platform-db:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PLATFORM_DB_URL: postgresql://platform_user:${PLATFORM_DB_PASSWORD:-platform_pass}@platform-db:5432/platform_db
    volumes:
      - ./partner/src/main/resources/contracts:/contracts/partner:ro
      - ./policy/src/main/resources/contracts:/contracts/policy:ro
      - ./product/src/main/resources/contracts:/contracts/product:ro
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Apache Airflow ───────────────────────────────────────────────────────────

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow_pass}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  airflow-init:
    build:
      context: infra/airflow
      dockerfile: Dockerfile
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow_pass}@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: ["airflow", "db", "migrate"]
    networks:
      - backend

  airflow-scheduler:
    build:
      context: infra/airflow
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      platform-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow_pass}@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PLATFORM_DB_URL: postgresql://platform_user:${PLATFORM_DB_PASSWORD:-platform_pass}@platform-db:5432/platform_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/dbt:/opt/dbt
      - ./partner/src/main/resources/contracts:/contracts/partner:ro
      - ./policy/src/main/resources/contracts:/contracts/policy:ro
      - ./product/src/main/resources/contracts:/contracts/product:ro
    command: ["airflow", "scheduler"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  airflow-webserver:
    build:
      context: infra/airflow
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow_pass}@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__WORKERS: "2"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
    command: ["airflow", "webserver", "--port", "8091"]
    ports:
      - "8091:8091"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ── DataHub Metadata Platform ─────────────────────────────────────────────
  # Reuses the existing kafka:29092 and schema-registry:8081 — no extra Kafka/ZooKeeper needed.

  datahub-mysql:
    image: mysql:8.2
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: datahub
      MYSQL_ROOT_PASSWORD: datahub
      MYSQL_ROOT_HOST: '%'
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u datahub --password=datahub"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - datahub-mysql-data:/var/lib/mysql
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 768M

  datahub-elasticsearch:
    image: elasticsearch:7.10.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g -Dlog4j2.formatMsgNoLookups=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=0s' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "9200:9200"
    volumes:
      - datahub-esdata:/usr/share/elasticsearch/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1536M

  datahub-kafka-setup:
    image: acryldata/datahub-kafka-setup:head
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_SCHEMAREGISTRY_URL: http://schema-registry:8081
      DATAHUB_PRECREATE_TOPICS: "true"
    networks:
      - backend

  datahub-upgrade:
    image: acryldata/datahub-upgrade:head
    command: ["-u", "SystemUpdate"]
    restart: "no"
    depends_on:
      datahub-elasticsearch:
        condition: service_healthy
      datahub-kafka-setup:
        condition: service_completed_successfully
      datahub-mysql:
        condition: service_healthy
    environment:
      DATAHUB_SQL_SETUP_ENABLED: "true"
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_URL: "jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8"
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_SCHEMAREGISTRY_URL: http://schema-registry:8081
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES: "false"
      GRAPH_SERVICE_IMPL: elasticsearch
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      BACKFILL_BROWSE_PATHS_V2: "true"
      REPROCESS_DEFAULT_BROWSE_PATHS_V2: "false"
      AUTHENTICATION_TOKEN_SERVICE_SIGNING_KEY: or/VSQweIyaf4TzKiUvv9ya3i27SHn4U0abFJEn/Btg=
      AUTHENTICATION_TOKEN_SERVICE_SALT: G9DoHS3OefFgdwqyLm82QevjXlJ0jW+gTgmOW6ZHvOc=
    networks:
      - backend

  datahub-gms:
    image: acryldata/datahub-gms:head
    restart: unless-stopped
    depends_on:
      datahub-upgrade:
        condition: service_completed_successfully
    environment:
      DATAHUB_SERVER_TYPE: quickstart
      DATAHUB_TELEMETRY_ENABLED: "false"
      DATAHUB_UPGRADE_HISTORY_KAFKA_CONSUMER_GROUP_ID: generic-duhe-consumer-job-client-gms
      EBEAN_DATASOURCE_DRIVER: com.mysql.jdbc.Driver
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_PASSWORD: datahub
      EBEAN_DATASOURCE_URL: "jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8"
      EBEAN_DATASOURCE_USERNAME: datahub
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ELASTICSEARCH_PORT: "9200"
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      ENTITY_SERVICE_ENABLE_RETENTION: "true"
      ES_BULK_REFRESH_POLICY: WAIT_UNTIL
      GRAPH_SERVICE_DIFF_MODE_ENABLED: "true"
      GRAPH_SERVICE_IMPL: elasticsearch
      JAVA_OPTS: "-Xms512m -Xmx1g"
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_CONSUMER_STOP_ON_DESERIALIZATION_ERROR: "true"
      KAFKA_SCHEMAREGISTRY_URL: http://schema-registry:8081
      MAE_CONSUMER_ENABLED: "true"
      MCE_CONSUMER_ENABLED: "true"
      METADATA_SERVICE_AUTH_ENABLED: "false"
      PE_CONSUMER_ENABLED: "true"
      THEME_V2_DEFAULT: "true"
      UI_INGESTION_ENABLED: "true"
      AUTHENTICATION_TOKEN_SERVICE_SIGNING_KEY: or/VSQweIyaf4TzKiUvv9ya3i27SHn4U0abFJEn/Btg=
      AUTHENTICATION_TOKEN_SERVICE_SALT: G9DoHS3OefFgdwqyLm82QevjXlJ0jW+gTgmOW6ZHvOc=
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    ports:
      - "8080:8080"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1280M

  datahub-frontend:
    image: acryldata/datahub-frontend-react:head
    restart: unless-stopped
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SECRET: YouKnowNothing
      DATAHUB_APP_VERSION: "1.0"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: 10MB
      JAVA_OPTS: "-Xms256m -Xmx512m -Dhttp.port=9002 -Dconfig.file=datahub-frontend/conf/application.conf -Djava.security.auth.login.config=datahub-frontend/conf/jaas.conf -Dlogback.configurationFile=datahub-frontend/conf/logback.xml -Dlogback.debug=false -Dpidfile.path=/dev/null"
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      DATAHUB_TRACKING_TOPIC: DataHubUsageEvent_v1
      ELASTIC_CLIENT_HOST: datahub-elasticsearch
      ELASTIC_CLIENT_PORT: "9200"
    ports:
      - "9002:9002"
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 768M

  datahub-actions:
    image: acryldata/datahub-actions:head-slim
    restart: unless-stopped
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_GMS_PROTOCOL: http
      DATAHUB_SYSTEM_CLIENT_ID: __datahub_system
      DATAHUB_SYSTEM_CLIENT_SECRET: JohnSnowKnowsNothing
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      METADATA_AUDIT_EVENT_NAME: MetadataAuditEvent_v4
      METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME: MetadataChangeLog_Versioned_v1
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

  datahub-ingest:
    build:
      context: infra/datahub
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      datahub-gms:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      DATAHUB_GMS_URL: http://datahub-gms:8080
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONTRACTS_ROOT: /contracts
    volumes:
      - ./partner/src/main/resources/contracts:/contracts/partner:ro
      - ./policy/src/main/resources/contracts:/contracts/policy:ro
      - ./product/src/main/resources/contracts:/contracts/product:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  partner-db-data:
  product-db-data:
  policy-db-data:
  platform-db-data:
  spark-warehouse:
  spark-ivy2:
  airflow-db-data:
  datahub-mysql-data:
  datahub-esdata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
