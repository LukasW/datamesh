  partner-db-data:
  product-db-data:
  policy-db-data:
  claims-db-data:
  billing-db-data:
  hr-db-data:
  minio-data:
  nessie-data:
  superset-db-data:
  openmetadata-db-data:
  openmetadata-esdata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
