apiVersion: v1
kind: Service
metadata:
  name: policy-service
  namespace: datamesh
spec:
  selector:
    app: policy-service
  ports:
    - port: 9082
      targetPort: 9082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-service
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-service
  template:
    metadata:
      labels:
        app: policy-service
    spec:
      containers:
        - name: policy-service
          image: yuno/policy-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QUARKUS_PROFILE
              value: prod
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: SCHEMA_REGISTRY_URL
              value: http://schema-registry:8081
            - name: DATABASE_URL
              value: jdbc:postgresql://policy-db:5432/policy_db
            - name: DATABASE_USER
              value: policy_user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: policy-db-password
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_FRONTEND_URL
              value: http://keycloak.localhost
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-config
                  key: oidc-client-secret
            - name: GRPC_PREMIUM_HOST
              value: product-service
            - name: GRPC_PREMIUM_PORT
              value: "9181"
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4317
          ports:
            - containerPort: 9082
          readinessProbe:
            httpGet:
              path: /q/metrics
              port: 9082
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 384Mi
