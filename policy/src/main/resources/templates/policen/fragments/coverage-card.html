<div class="card mb-2 border-secondary" id="deckung-{coverage.coverageId}">
  <div class="card-body p-3">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <span class="badge bg-secondary me-1">{coverage.coverageType}</span>
        <span class="fw-semibold">CHF {coverage.insuredAmount}</span>
        <small class="text-muted ms-2">Versicherungssumme</small>
      </div>
      {#if policyStatus != "CANCELLED" && policyStatus != "EXPIRED"}
      <button class="btn btn-sm btn-outline-danger"
              hx-delete="/api/policen/{policyId}/deckungen/{coverage.coverageId}"
              hx-confirm="Deckung '{coverage.coverageType}' wirklich entfernen?"
              hx-target="#deckung-{coverage.coverageId}"
              hx-swap="outerHTML">
        Entfernen
      </button>
      {/if}
    </div>
  </div>
</div>
