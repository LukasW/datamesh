<div class="card mb-2 border-secondary" id="deckung-{deckung.deckungId}">
  <div class="card-body p-3">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <span class="badge bg-secondary me-1">{deckung.deckungstyp}</span>
        <span class="fw-semibold">CHF {deckung.versicherungssumme}</span>
        <small class="text-muted ms-2">Versicherungssumme</small>
      </div>
      {#if policyStatus != "GEKUENDIGT" && policyStatus != "ABGELAUFEN"}
      <button class="btn btn-sm btn-outline-danger"
              hx-delete="/api/policen/{policyId}/deckungen/{deckung.deckungId}"
              hx-confirm="Deckung '{deckung.deckungstyp}' wirklich entfernen?"
              hx-target="#deckung-{deckung.deckungId}"
              hx-swap="outerHTML">
        Entfernen
      </button>
      {/if}
    </div>
  </div>
</div>
