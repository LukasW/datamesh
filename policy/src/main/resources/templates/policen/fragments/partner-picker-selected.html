<div id="partner-picker">
  <input type="hidden" name="partnerId" value="{partnerId}">
  <div class="input-group">
    <input type="text" class="form-control" value="{partnerName}" readonly
           placeholder="Partner gewählt">
    <button type="button" class="btn btn-outline-secondary"
            hx-get="/policies/fragments/partner-search"
            hx-target="#partner-suche-container"
            hx-swap="innerHTML"
            hx-trigger="click">
      🔍 Ändern
    </button>
  </div>
  <small class="text-muted">ID: {partnerId}</small>
  <div id="partner-suche-container"></div>
</div>
