<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{#insert title}Policenverwaltung{/insert}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body { padding-top: 60px; }
    .navbar-brand { font-weight: bold; }
    .badge-ENTWURF    { background-color: #ffc107; color: #212529; }
    .badge-AKTIV      { background-color: #198754; }
    .badge-GEKUENDIGT { background-color: #dc3545; }
    .badge-ABGELAUFEN { background-color: #6c757d; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/policen">Policenverwaltung</a>
      <div class="navbar-nav">
        <a class="nav-link text-white" href="/swagger-ui">API Docs</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-3">
    {#insert content /}
  </div>

  <div class="modal fade" id="mainModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content" id="modal-container"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/policy-modal.js"></script>
  <script>
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'modal-container') {
        new bootstrap.Modal(document.getElementById('mainModal')).show();
      }
    });
  </script>
</body>
</html>
