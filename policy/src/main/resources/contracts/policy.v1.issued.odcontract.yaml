apiVersion: v1
kind: DataContract
metadata:
  name: policy.v1.issued
  version: "1.0.0"
  domain: policy
  description: Event published when a policy transitions from ENTWURF to AKTIV

spec:
  topic: policy.v1.issued
  format: JSON
  schemaFile: schema/PolicyIssued.schema.json

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["PolicyIssued"]
        nullable: false
      - name: policyId
        type: string
        format: uuid
        nullable: false
      - name: policyNumber
        type: string
        nullable: false
      - name: partnerId
        type: string
        format: uuid
        nullable: false
      - name: productId
        type: string
        format: uuid
        nullable: false
      - name: coverageStartDate
        type: string
        format: date
        description: ISO-8601 (yyyy-MM-dd)
        nullable: false
      - name: premium
        type: string
        description: Premium in CHF as decimal string
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for policy.v1.issued:
          - not_null:
              columns: [eventId, eventType, policyId, policyNumber, partnerId, productId, coverageStartDate, premium, timestamp]
          - no_duplicate_rows:
              columns: [eventId]
          - valid_values:
              column: eventType
              valid_values: ["PolicyIssued"]

dataProduct:
  owner: team-policy@css.ch
  domain: policy
  outputPort: kafka
  sla:
    freshness: 5m
    availability: "99.9%"
    qualityScore: 0.98
  tags:
    - pii
  accessPatterns:
    - type: kafka-consumer
      description: "Subscribe to the topic for real-time event processing"
      protocol: kafka
      config:
        bootstrap.servers: "${KAFKA_BOOTSTRAP_SERVERS}"
        group.id: "${CONSUMER_GROUP_ID}"
        auto.offset.reset: earliest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
