apiVersion: v1
kind: DataContract
metadata:
  name: policy.v1.coverage-removed
  version: "1.0.0"
  domain: policy
  description: Event published when a coverage (Deckung) is removed from a policy

spec:
  topic: policy.v1.coverage-removed
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["CoverageRemoved"]
        nullable: false
      - name: policyId
        type: string
        format: uuid
        nullable: false
      - name: deckungId
        type: string
        format: uuid
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for policy.v1.coverage-removed:
          - not_null:
              columns: [eventId, eventType, policyId, deckungId, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

