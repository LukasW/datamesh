apiVersion: v1
kind: DataContract
metadata:
  name: policy.v1.changed
  version: "1.0.0"
  domain: policy
  description: Event published when policy financial details (premium, deductible) are updated

spec:
  topic: policy.v1.changed
  format: AVRO
  schemaRegistry: http://schema-registry:8081
  schemaSubject: policy.v1.changed-value

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["PolicyChanged"]
        nullable: false
      - name: policyId
        type: string
        format: uuid
        nullable: false
      - name: policyNumber
        type: string
        nullable: false
      - name: premium
        type: string
        description: Premium in CHF as decimal string
        nullable: false
      - name: deductible
        type: string
        description: Deductible in CHF as decimal string
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for policy.v1.changed:
          - not_null:
              columns: [eventId, eventType, policyId, policyNumber, premium, deductible, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

dataProduct:
  owner: team-policy@css.ch
  domain: policy
  outputPort: kafka
  sla:
    freshness: 5m
    availability: "99.9%"
    qualityScore: 0.98
  tags:
    - pii
