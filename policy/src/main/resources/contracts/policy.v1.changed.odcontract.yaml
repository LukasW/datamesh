apiVersion: v1
kind: DataContract
metadata:
  name: policy.v1.changed
  version: "1.0.0"
  domain: policy
  description: Event published when policy details (praemie, selbstbehalt, etc.) are updated

spec:
  topic: policy.v1.changed
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["PolicyChanged"]
        nullable: false
      - name: policyId
        type: string
        format: uuid
        nullable: false
      - name: policyNummer
        type: string
        nullable: false
      - name: praemie
        type: number
        format: decimal
        nullable: false
      - name: selbstbehalt
        type: number
        format: decimal
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for policy.v1.changed:
          - not_null:
              columns: [eventId, eventType, policyId, policyNummer, praemie, selbstbehalt, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

