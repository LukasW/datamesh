apiVersion: v1
kind: DataContract
metadata:
  name: policy.v1.coverage-added
  version: "1.0.0"
  domain: policy
  description: Event published when a coverage (Deckung) is added to a policy

spec:
  topic: policy.v1.coverage-added
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["CoverageAdded"]
        nullable: false
      - name: policyId
        type: string
        format: uuid
        nullable: false
      - name: deckungId
        type: string
        format: uuid
        nullable: false
      - name: deckungstyp
        type: string
        enum: ["HAFTPFLICHT","KASKOSCHADEN","GLASBRUCH","ELEMENTAR","DIEBSTAHL","GEBAEUDE","HAUSRAT"]
        nullable: false
      - name: versicherungssumme
        type: number
        format: decimal
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for policy.v1.coverage-added:
          - not_null:
              columns: [eventId, eventType, policyId, deckungId, deckungstyp, versicherungssumme, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

