apiVersion: v1
kind: DataContract
metadata:
  name: policy.v1.coverage-added
  version: "1.0.0"
  domain: policy
  description: Event published when a coverage is added to a policy

spec:
  topic: policy.v1.coverage-added
  format: JSON
  schemaFile: schema/CoverageAdded.schema.json

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["CoverageAdded"]
        nullable: false
      - name: policyId
        type: string
        format: uuid
        nullable: false
      - name: coverageId
        type: string
        format: uuid
        nullable: false
      - name: coverageType
        type: string
        enum: ["HAFTPFLICHT","KASKOSCHADEN","GLASBRUCH","ELEMENTAR","DIEBSTAHL","GEBAEUDE","HAUSRAT"]
        nullable: false
      - name: insuredAmount
        type: string
        description: Insured amount in CHF as decimal string
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for policy.v1.coverage-added:
          - not_null:
              columns: [eventId, eventType, policyId, coverageId, coverageType, insuredAmount, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

dataProduct:
  owner: team-policy@css.ch
  domain: policy
  outputPort: kafka
  sla:
    freshness: 5m
    availability: "99.9%"
    qualityScore: 0.98
  tags:
    - pii
  accessPatterns:
    - type: kafka-consumer
      description: "Subscribe to the topic for real-time event processing"
      protocol: kafka
      config:
        bootstrap.servers: "${KAFKA_BOOTSTRAP_SERVERS}"
        group.id: "${CONSUMER_GROUP_ID}"
        auto.offset.reset: earliest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
