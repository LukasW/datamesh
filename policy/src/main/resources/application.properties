mp.messaging.incoming.product-defined-in.group.id=policy-service-product
mp.messaging.incoming.product-defined-in.auto.offset.reset=earliest
mp.messaging.incoming.product-defined-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.product-defined-in.dead-letter-queue.topic=product-defined-dlq

mp.messaging.incoming.product-updated-in.connector=smallrye-kafka
