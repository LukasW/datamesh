# ── Kafka bootstrap (prod profile only) ──────────────────────────────────────
%prod.mp.messaging.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}

# ── OpenLineage (data lineage to Marquez) ────────────────────────────────────
%prod.openlineage.url=${OPENLINEAGE_URL:http://marquez:5050}

# ── Outgoing channels: removed – Debezium CDC publishes policy events via outbox table ──

# ── Incoming channels (JSON strings from Debezium outbox via StringConverter) ─
mp.messaging.incoming.partner-person-created.connector=smallrye-kafka
mp.messaging.incoming.partner-person-created.topic=person.v1.created
mp.messaging.incoming.partner-person-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.partner-person-created.group.id=policy-service-partner
mp.messaging.incoming.partner-person-created.auto.offset.reset=earliest
mp.messaging.incoming.partner-person-created.failure-strategy=dead-letter-queue
mp.messaging.incoming.partner-person-created.dead-letter-queue.topic=partner-person-created-dlq

mp.messaging.incoming.partner-person-updated.connector=smallrye-kafka
mp.messaging.incoming.partner-person-updated.topic=person.v1.updated
mp.messaging.incoming.partner-person-updated.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.partner-person-updated.group.id=policy-service-partner
mp.messaging.incoming.partner-person-updated.auto.offset.reset=earliest
mp.messaging.incoming.partner-person-updated.failure-strategy=dead-letter-queue
mp.messaging.incoming.partner-person-updated.dead-letter-queue.topic=partner-person-updated-dlq

