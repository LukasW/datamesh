# ── Kafka bootstrap (prod profile only) ──────────────────────────────────────
%prod.mp.messaging.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ── Outgoing channels (Avro + Confluent Schema Registry) ─────────────────────
mp.messaging.outgoing.policy-issued.connector=smallrye-kafka
mp.messaging.outgoing.policy-issued.topic=policy.v1.issued
mp.messaging.outgoing.policy-issued.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.policy-issued.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.policy-issued.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.outgoing.policy-cancelled.connector=smallrye-kafka
mp.messaging.outgoing.policy-cancelled.topic=policy.v1.cancelled
mp.messaging.outgoing.policy-cancelled.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.policy-cancelled.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.policy-cancelled.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.outgoing.policy-changed.connector=smallrye-kafka
mp.messaging.outgoing.policy-changed.topic=policy.v1.changed
mp.messaging.outgoing.policy-changed.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.policy-changed.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.policy-changed.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.outgoing.policy-coverage-added.connector=smallrye-kafka
mp.messaging.outgoing.policy-coverage-added.topic=policy.v1.coverage-added
mp.messaging.outgoing.policy-coverage-added.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.policy-coverage-added.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.policy-coverage-added.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

mp.messaging.outgoing.policy-coverage-removed.connector=smallrye-kafka
mp.messaging.outgoing.policy-coverage-removed.topic=policy.v1.coverage-removed
mp.messaging.outgoing.policy-coverage-removed.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.policy-coverage-removed.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.policy-coverage-removed.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

# ── Incoming channels (JSON strings from Debezium outbox via StringConverter) ─
mp.messaging.incoming.partner-person-created.connector=smallrye-kafka
mp.messaging.incoming.partner-person-created.topic=person.v1.created
mp.messaging.incoming.partner-person-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.partner-person-created.group.id=policy-service-partner
mp.messaging.incoming.partner-person-created.auto.offset.reset=earliest

mp.messaging.incoming.partner-person-updated.connector=smallrye-kafka
mp.messaging.incoming.partner-person-updated.topic=person.v1.updated
mp.messaging.incoming.partner-person-updated.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.partner-person-updated.group.id=policy-service-partner
mp.messaging.incoming.partner-person-updated.auto.offset.reset=earliest

mp.messaging.incoming.product-defined-in.connector=smallrye-kafka
mp.messaging.incoming.product-defined-in.topic=product.v1.defined
mp.messaging.incoming.product-defined-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.product-defined-in.group.id=policy-service-product
mp.messaging.incoming.product-defined-in.auto.offset.reset=earliest

mp.messaging.incoming.product-updated-in.connector=smallrye-kafka
mp.messaging.incoming.product-updated-in.topic=product.v1.updated
mp.messaging.incoming.product-updated-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.product-updated-in.group.id=policy-service-product
mp.messaging.incoming.product-updated-in.auto.offset.reset=earliest

mp.messaging.incoming.product-deprecated-in.connector=smallrye-kafka
mp.messaging.incoming.product-deprecated-in.topic=product.v1.deprecated
mp.messaging.incoming.product-deprecated-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.product-deprecated-in.group.id=policy-service-product
mp.messaging.incoming.product-deprecated-in.auto.offset.reset=earliest
