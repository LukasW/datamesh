apiVersion: v1
kind: Service
metadata:
  name: claims-service
  namespace: datamesh
spec:
  selector:
    app: claims-service
  ports:
    - port: 9083
      targetPort: 9083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-service
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claims-service
  template:
    metadata:
      labels:
        app: claims-service
    spec:
      containers:
        - name: claims-service
          image: yuno/claims-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QUARKUS_PROFILE
              value: prod
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: DATABASE_URL
              value: jdbc:postgresql://claims-db:5432/claims_db
            - name: DATABASE_USER
              value: claims_user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: claims-db-password
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_FRONTEND_URL
              value: http://keycloak.localhost
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-config
                  key: oidc-client-secret
            - name: VAULT_URL
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-config
                  key: vault-token
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4317
          ports:
            - containerPort: 9083
          readinessProbe:
            httpGet:
              path: /q/metrics
              port: 9083
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 384Mi
