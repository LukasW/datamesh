# ── Kafka bootstrap (prod profile only) ──────────────────────────────────────
%prod.mp.messaging.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}

# ── Incoming: policy.v1.issued → local PolicySnapshot read model (ADR-008) ───
mp.messaging.incoming.policy-issued-in.connector=smallrye-kafka
mp.messaging.incoming.policy-issued-in.topic=policy.v1.issued
mp.messaging.incoming.policy-issued-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.policy-issued-in.group.id=claims-service-policy
mp.messaging.incoming.policy-issued-in.auto.offset.reset=earliest
mp.messaging.incoming.policy-issued-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.policy-issued-in.dead-letter-queue.topic=claims-policy-issued-dlq

# ── Outgoing channels ─────────────────────────────────────────────────────────
# (Events are published via Debezium outbox CDC, no direct Kafka producer needed)
