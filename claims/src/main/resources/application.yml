quarkus:
  application:
    name: claims-service
    version: 1.0.0

  http:
    port: 9083
    auth:
      permission:
        public:
          paths: /q/*,/swagger-ui/*,/openapi
          policy: permit
        authenticated:
          paths: /*
          policy: authenticated

  smallrye-openapi:
    info-title: Claims Service API
    info-version: 1.0.0
    info-description: REST API for Claims Management (Hexagonal Architecture)
    info-contact-name: Yuno Team
    path: /openapi

  swagger-ui:
    always-include: true
    path: /swagger-ui

  datasource:
    db-kind: postgresql

  hibernate-orm:
    schema-management:
      strategy: none # Use Flyway for migrations

  hibernate-envers:
    store-data-at-delete: true
    audit-table-suffix: _aud
    revision-field-name: rev
    revision-type-field-name: rev_type

  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    schemas: public
    table: flyway_schema_history
    locations: classpath:db/migration

  virtual-threads:
    enabled: true

  oidc:
    auth-server-url: http://localhost:8180/realms/yuno
    client-id: claims-service
    credentials:
      secret: secret
    application-type: hybrid
    roles:
      role-claim-path: realm_access/roles

  otel:
    enabled: true
    exporter:
      otlp:
        endpoint: http://localhost:4317

  log:
    level: INFO
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p traceId=%X{traceId} spanId=%X{spanId} [%c{3.}] (%t) %s%e%n"

"%prod":
  quarkus:
    datasource:
      db-version: "12.0"
      username: ${DATABASE_USER}
      password: ${DATABASE_PASSWORD}
      jdbc:
        url: ${DATABASE_URL}
    oidc:
      auth-server-url: ${KEYCLOAK_URL}/realms/yuno
      client-id: claims-service
      credentials:
        secret: ${OIDC_CLIENT_SECRET}
      discovery-enabled: false
      authorization-path: ${KEYCLOAK_FRONTEND_URL}/realms/yuno/protocol/openid-connect/auth
      token-path: /protocol/openid-connect/token
      jwks-path: /protocol/openid-connect/certs
      user-info-path: /protocol/openid-connect/userinfo
      end-session-path: ${KEYCLOAK_FRONTEND_URL}/realms/yuno/protocol/openid-connect/logout
