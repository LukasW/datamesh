{! Policy picker fragment (htmx) – rendered by ClaimUiController.partnerPolicies() !}
{#if policies.isEmpty}
<div class="text-muted p-2">Keine Policen für diesen Partner gefunden.</div>
{#else}
<select class="form-select" onchange="document.getElementById('policyId').value=this.value">
  <option value="" selected>Bitte Police auswählen…</option>
  {#for policy in policies}
  <option value="{policy.policyId}">
    {policy.policyNumber} – ab {policy.coverageStartDate} – {policy.premium} CHF/Jahr
  </option>
  {/for}
</select>
{/if}
