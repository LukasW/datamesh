{! Policy picker fragment (htmx) – rendered by ClaimUiController.partnerPolicies() !}
{#if policies.isEmpty}
<div class="text-muted p-2">Keine Policen für diesen Partner gefunden.</div>
{#else}
<div class="list-group">
  {#for policy in policies}
  <div class="list-group-item list-group-item-action policy-card"
       style="cursor:pointer"
       onclick="document.getElementById('policyId').value='{policy.policyId}'; document.querySelectorAll('.policy-card').forEach(c => c.classList.remove('active')); this.classList.add('active');">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <strong>{policy.policyNumber}</strong>
        <span class="text-muted ms-2">ab {policy.coverageStartDate}</span>
      </div>
      <span class="badge bg-secondary">{policy.premium} CHF/Jahr</span>
    </div>
  </div>
  {/for}
</div>
{/if}
