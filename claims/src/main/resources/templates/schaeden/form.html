{#include layout/base}
{#title}Neue Schadenmeldung{/title}
{#content}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/claims">Schadenfälle</a></li>
        <li class="breadcrumb-item active">Neue Schadenmeldung</li>
      </ol>
    </nav>

    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Schadenmeldung erfassen (First Notice of Loss)</h5>
      </div>
      <div class="card-body">

        {#if errorMessage}
        <div class="alert alert-danger alert-dismissible" role="alert">
          <strong>Fehler:</strong> {errorMessage}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {/if}

        <form method="post" action="/claims/neu" novalidate>

          <div class="mb-3">
            <label for="policyId" class="form-label fw-semibold">Police-ID <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="policyId" name="policyId"
                   value="{policyId ?: ''}"
                   placeholder="z.B. a1b2c3d4-e5f6-…"
                   required/>
            <div class="form-text text-muted">Die UUID der versicherten Police.</div>
          </div>

          <div class="mb-3">
            <label for="claimDate" class="form-label fw-semibold">Schadensdatum <span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="claimDate" name="claimDate"
                   value="{claimDate ?: ''}"
                   required/>
          </div>

          <div class="mb-4">
            <label for="description" class="form-label fw-semibold">Schadensbeschreibung <span class="text-danger">*</span></label>
            <textarea class="form-control" id="description" name="description"
                      rows="4" required
                      placeholder="Bitte beschreiben Sie den Schaden möglichst genau …">{description ?: ''}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                   class="bi bi-plus-circle me-1" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
              </svg>
              Schadenmeldung erfassen
            </button>
            <a href="/claims" class="btn btn-outline-secondary">Abbrechen</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{/content}
{/include}
