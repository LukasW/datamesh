# ?????????????????????????????????????????????????????????????????????????????
# Test profile overrides ? active when running mvn test / @QuarkusTest
# ?????????????????????????????????????????????????????????????????????????????

# Disable OIDC ? @TestSecurity provides the identity instead
%test.quarkus.oidc.enabled=false

# Disable the Kafka channel so no broker is required in tests.
# SmallRye Reactive Messaging 3+ honours the enabled=false flag and skips
# both the connector lookup and the wiring validation for that channel.
%test.mp.messaging.incoming.policy-issued-in.enabled=false
%test.mp.messaging.incoming.partner-state-in.enabled=false

# Also tell Quarkus DevServices not to spin up a Kafka broker ? the channel
# is disabled so there is nothing to connect to.
%test.quarkus.kafka.devservices.enabled=false

# Quarkus DevServices auto-starts a PostgreSQL container (Testcontainers).
# The quarkus-jdbc-postgresql-deployment artifact on the test classpath enables this.
%test.quarkus.datasource.devservices.enabled=true

# Run Flyway migrations on every test run
%test.quarkus.flyway.migrate-at-start=true

# Use a random port so parallel test suites don't clash
%test.quarkus.http.test-port=0

# Reduce noise in test logs
%test.quarkus.log.level=WARN
%test.quarkus.log.category."ch.yuno".level=INFO


