apiVersion: v2.2.2
kind: DataContract
id: product.v1.updated
info:
  title: Product Updated Event
  version: 1.0.0
  description: Published when an insurance product's details are changed.
  owner: Product Management Team
  contact:
    email: team-product@yuno.ch
  domain: product
  outputPort: kafka
  sla:
    freshness: 10m
    availability: "99.9%"
    qualityScore: 0.99
  tags: []

servers:
  - type: kafka
    host: localhost:9092
    topic: product.v1.updated
    format: JSON

terms:
  retention: 7 years

schema:
  type: object
  fields:
    - name: eventId
      type: string
      format: uuid
      required: true
    - name: eventType
      type: string
      required: true
      enum: [ProductUpdated]
    - name: productId
      type: string
      format: uuid
      required: true
    - name: name
      type: string
      required: true
    - name: productLine
      type: string
      required: true
      enum: [HOUSEHOLD_CONTENTS, LIABILITY, MOTOR_VEHICLE, TRAVEL, LEGAL_EXPENSES]
    - name: basePremium
      type: number
      required: true
    - name: timestamp
      type: string
      format: date-time
      required: true

dataProduct:
  accessPatterns:
    - type: kafka-consumer
      description: "Subscribe to the topic for real-time event processing"
      protocol: kafka
      config:
        bootstrap.servers: "${KAFKA_BOOTSTRAP_SERVERS}"
        group.id: "${CONSUMER_GROUP_ID}"
        auto.offset.reset: earliest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer

quality:
  type: SodaCL
  specification:
    checks for product.v1.updated:
      - not null: [eventId, eventType, productId, name, productLine, basePremium, timestamp]
      - no duplicate values: [eventId]
