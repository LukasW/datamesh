apiVersion: v2.2.2
kind: DataContract
id: product.v1.defined
info:
  title: Product Defined Event
  version: 1.0.0
  description: Published when a new insurance product is defined in the system.
  owner: Product Management Team
  contact:
    name: CSS Product Team
    email: team-product@css.ch
  domain: product
  outputPort: kafka
  sla:
    freshness: 10m
    availability: "99.9%"
    qualityScore: 0.99
  tags: []

servers:
  - type: kafka
    host: localhost:9092
    topic: product.v1.defined
    format: AVRO
    schemaRegistry: http://schema-registry:8081
    schemaSubject: product.v1.defined-value

terms:
  usage: Consume to build product catalogs in downstream systems.
  limitations: Do not use as source of truth for pricing; always validate with the product service.
  retention: 7 years

schema:
  type: object
  fields:
    - name: eventId
      type: string
      format: uuid
      required: true
      description: Unique identifier for this event instance.
    - name: eventType
      type: string
      required: true
      enum: [ProductDefined]
    - name: productId
      type: string
      format: uuid
      required: true
      description: Unique identifier of the product.
    - name: name
      type: string
      required: true
      description: Product name.
    - name: productLine
      type: string
      required: true
      enum: [HOUSEHOLD_CONTENTS, LIABILITY, MOTOR_VEHICLE, TRAVEL, LEGAL_EXPENSES]
      description: Insurance product line.
    - name: basePremium
      type: number
      required: true
      description: Base premium in CHF.
    - name: timestamp
      type: string
      format: date-time
      required: true
      description: ISO-8601 timestamp of event creation.

quality:
  type: SodaCL
  specification:
    checks for product.v1.defined:
      - not null: [eventId, eventType, productId, name, productLine, basePremium, timestamp]
      - no duplicate values: [eventId]
