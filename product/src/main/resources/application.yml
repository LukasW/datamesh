quarkus:
  application:
    name: product-service
    version: 1.0.0

  http:
    port: 9081

  smallrye-openapi:
    info-title: Product Service API
    info-version: 1.0.0
    info-description: REST API für Produktverwaltung (Hexagonal Architecture)
    info-contact-name: CSS Team
    path: /openapi

  swagger-ui:
    always-include: true
    path: /swagger-ui

  datasource:
    db-kind: postgresql

  hibernate-orm:
    schema-management:
      strategy: none # Use Flyway for migrations

  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    schemas: public
    table: flyway_schema_history
    locations: classpath:db/migration

  log:
    level: INFO

# Prod: explicit DB connection (env-var driven)
# Kafka publishing is handled by Debezium CDC reading the outbox table – no Kafka client needed here.
"%prod":
  quarkus:
    datasource:
      db-version: "12.0"
      username: ${DATABASE_USER:product_user}
      password: ${DATABASE_PASSWORD:product_pass}
      jdbc:
        url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/product_db}
