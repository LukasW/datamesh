quarkus:
  application:
    name: product-service
    version: 1.0.0

  http:
    port: 9081
    auth:
      permission:
        public:
          paths: /q/*,/swagger-ui/*,/openapi
          policy: permit
        authenticated:
          paths: /*
          policy: authenticated

  smallrye-openapi:
    info-title: Product Service API
    info-version: 1.0.0
    info-description: REST API für Produktverwaltung (Hexagonal Architecture)
    info-contact-name: Yuno Team
    path: /openapi

  swagger-ui:
    always-include: true
    path: /swagger-ui

  datasource:
    db-kind: postgresql

  hibernate-orm:
    schema-management:
      strategy: none # Use Flyway for migrations

  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    schemas: public
    table: flyway_schema_history
    locations: classpath:db/migration

  virtual-threads:
    enabled: true

  oidc:
    auth-server-url: http://localhost:8180/realms/yuno
    client-id: product-service
    credentials:
      secret: secret
    application-type: hybrid
    roles:
      role-claim-path: realm_access/roles

  grpc:
    server:
      port: 9181
      health:
        enabled: true

  otel:
    enabled: true
    exporter:
      otlp:
        endpoint: http://localhost:4317

  log:
    level: INFO
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p traceId=%X{traceId} spanId=%X{spanId} [%c{3.}] (%t) %s%e%n"

# Prod: explicit DB connection (env-var driven)
# Kafka publishing is handled by Debezium CDC reading the outbox table – no Kafka client needed here.
"%prod":
  quarkus:
    datasource:
      db-version: "12.0"
      username: ${DATABASE_USER}
      password: ${DATABASE_PASSWORD}
      jdbc:
        url: ${DATABASE_URL}
    oidc:
      auth-server-url: ${KEYCLOAK_URL}/realms/yuno
      client-id: product-service
      credentials:
        secret: ${OIDC_CLIENT_SECRET}
      discovery-enabled: false
      authorization-path: ${KEYCLOAK_FRONTEND_URL}/realms/yuno/protocol/openid-connect/auth
      token-path: /protocol/openid-connect/token
      jwks-path: /protocol/openid-connect/certs
      user-info-path: /protocol/openid-connect/userinfo
      end-session-path: ${KEYCLOAK_FRONTEND_URL}/realms/yuno/protocol/openid-connect/logout
  openlineage:
    url: ${OPENLINEAGE_URL:http://marquez:5050}
