apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: datamesh
spec:
  selector:
    app: product-service
  ports:
    - name: http
      port: 9081
      targetPort: 9081
    - name: grpc
      port: 9181
      targetPort: 9181
---
# gRPC NodePort for external access (premium calculation from local dev)
apiVersion: v1
kind: Service
metadata:
  name: product-grpc-external
  namespace: datamesh
spec:
  type: NodePort
  selector:
    app: product-service
  ports:
    - port: 9181
      targetPort: 9181
      nodePort: 30181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: datamesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: yuno/product-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QUARKUS_PROFILE
              value: prod
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: DATABASE_URL
              value: jdbc:postgresql://product-db:5432/product_db
            - name: DATABASE_USER
              value: product_user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-passwords
                  key: product-db-password
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_FRONTEND_URL
              value: http://keycloak.localhost
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-config
                  key: oidc-client-secret
            - name: OPENLINEAGE_URL
              value: http://marquez:5050
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4317
          ports:
            - containerPort: 9081
            - containerPort: 9181
          readinessProbe:
            httpGet:
              path: /q/metrics
              port: 9081
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 384Mi
