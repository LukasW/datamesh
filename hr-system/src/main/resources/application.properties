# HR System Stub – simulates an external COTS HR system
quarkus.application.name=hr-system
quarkus.http.port=9085

# Database
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.schemas=public
quarkus.flyway.locations=classpath:db/migration

# Dev profile – uses Quarkus Dev Services (auto-starts PostgreSQL via Testcontainers)
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=hr_db

# Docker Compose profile (explicit connection)
%compose.quarkus.datasource.username=hr_user
%compose.quarkus.datasource.password=hr_password
%compose.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5438/hr_db

# Prod profile (Docker)
%prod.quarkus.datasource.username=${DATABASE_USER}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL}

# No auth needed – this is a stub
quarkus.http.auth.permission.public.paths=/*
quarkus.http.auth.permission.public.policy=permit
