<div class="modal-header">
  <h5 class="modal-title">Neue Organisationseinheit</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
  <div id="org-form-errors"></div>

  <form id="org-neu-form"
        hx-post="/organisation"
        hx-target="#org-tabelle"
        hx-swap="innerHTML"
        hx-disabled-elt="find button[type='submit']"
        hx-on::after-request="if(event.detail.successful) bootstrap.Modal.getInstance(document.getElementById('mainModal')).hide()"
        hx-on:htmx:response-error="document.getElementById('org-form-errors').innerHTML = event.detail.xhr.responseText">

    <div class="row g-2 mb-2">
      <div class="col-md-4">
        <label class="form-label">ID <span class="text-danger">*</span></label>
        <input type="text" name="orgUnitId" class="form-control" placeholder="z.B. OU-FIN-001" required>
      </div>
      <div class="col-md-8">
        <label class="form-label">Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" required>
      </div>
    </div>

    <div class="row g-2 mb-2">
      <div class="col-md-6">
        <label class="form-label">Übergeordnete Einheit</label>
        <select name="parentOrgUnitId" class="form-select">
          <option value="">– keine –</option>
          {#for parent in allOrgUnits}
          <option value="{parent.orgUnitId}">{parent.name} ({parent.orgUnitId})</option>
          {/for}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Stufe</label>
        <input type="number" name="level" class="form-control" value="1" min="1">
      </div>
      <div class="col-md-3">
        <label class="form-label">Leiter/in (Employee-ID)</label>
        <select name="managerEmployeeId" class="form-select">
          <option value="">– kein/e –</option>
          {#for emp in employees}
          <option value="{emp.employeeId}">{emp.lastName} {emp.firstName}</option>
          {/for}
        </select>
      </div>
    </div>

    <div class="mt-3">
      <button type="submit" class="btn btn-primary">Erstellen</button>
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
    </div>
  </form>
</div>
