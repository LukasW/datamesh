# HR Integration Service – Camel bridge from OData to Kafka
quarkus.application.name=hr-integration
quarkus.http.port=9086

# === HR OData Connection ===
hr.odata.base-url=http://hr-system:9085/odata
hr.odata.polling-interval=60000
hr.odata.connect-timeout=5000
hr.odata.read-timeout=30000

# === Kafka Producer ===
camel.component.kafka.brokers=kafka:29092

# === Dev profile ===
%dev.hr.odata.base-url=http://localhost:9085/odata
%dev.camel.component.kafka.brokers=localhost:9092

# === OpenTelemetry (distributed tracing) ===
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%prod.quarkus.otel.exporter.otlp.endpoint=http://jaeger:4317

# === Logging ===
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p traceId=%X{traceId} spanId=%X{spanId} [%c{3.}] (%t) %s%e%n
quarkus.log.category."ch.yuno.hrintegration".level=DEBUG
quarkus.log.category."org.apache.camel".level=INFO

# No auth needed – pure integration service
quarkus.http.auth.permission.public.paths=/*
quarkus.http.auth.permission.public.policy=permit
