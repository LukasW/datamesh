apiVersion: v2.2.2
kind: DataContract
metadata:
  name: hr-org-unit-changed
  version: 1.0.0
  domain: hr
  owner: team-platform@yuno.ch
  description: >
    Change event topic for organization unit modifications from the external HR system.
  tags:
    - hr
    - change-event

infrastructure:
  platform: kafka
  topic: hr.v1.org-unit.changed
  format: json
  compaction: false
  retention: 90d

schema:
  fields:
    - name: eventId
      type: string
      description: Deterministic UUID from orgUnitId + version
      nullable: false
      primaryKey: true
    - name: eventType
      type: string
      description: "org-unit.created | org-unit.updated | org-unit.deleted"
      nullable: false
    - name: orgUnitId
      type: string
      nullable: false
    - name: externalId
      type: string
      nullable: false
    - name: timestamp
      type: timestamp
      nullable: false

sla:
  freshness: 5m
  availability: 99.5%
