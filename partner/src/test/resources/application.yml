quarkus:
  application:
    name: person-service
    version: 1.0.0

  http:
    port: 0
    test-port: 0

  datasource:
    db-kind: postgresql
    devservices:
      enabled: true

  flyway:
    migrate-at-start: true

  oidc:
    enabled: false

  security:
    auth:
      enabled-in-dev-mode: false

  http:
    auth:
      permission:
        authenticated:
          paths: /*
          policy: permit

  log:
    level: INFO

# Disable Kafka channels in unit/integration tests
mp:
  messaging:
    incoming:
      policy-issued-in:
        enabled: false

