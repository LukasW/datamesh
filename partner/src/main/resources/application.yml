quarkus:
  application:
    name: person-service
    version: 1.0.0

  http:
    port: 9080

  smallrye-openapi:
    info-title: Person Service API
    info-version: 1.0.0
    info-description: REST API für Personenverwaltung (Hexagonal Architecture)
    info-contact-name: CSS Team
    path: /openapi

  swagger-ui:
    always-include: true
    path: /swagger-ui

  datasource:
    db-kind: postgresql

  hibernate-orm:
    schema-management:
      strategy: none # Use Flyway for migrations

  hibernate-envers:
    store-data-at-delete: true
    audit-table-suffix: _aud
    revision-field-name: rev
    revision-type-field-name: rev_type

  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    schemas: public
    table: flyway_schema_history
    locations: classpath:db/migration

  log:
    level: INFO

# Prod: explicit DB + Kafka broker (env-var driven)
"%prod":
  quarkus:
    datasource:
      db-version: "12.0"
      username: ${DATABASE_USER:partner_user}
      password: ${DATABASE_PASSWORD:partner_pass}
      jdbc:
        url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/partner_db}
  mp:
    messaging:
      kafka:
        bootstrap.servers: ${KAFKA_BROKERS:localhost:9092}

# Messaging channels (connector/topic/serializers shared across all profiles)
# bootstrap.servers is omitted → Kafka DevServices (Redpanda) used in dev/test
mp:
  messaging:
    outgoing:
      person-created:
        connector: smallrye-kafka
        topic: person.v1.created
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer

      person-updated:
        connector: smallrye-kafka
        topic: person.v1.updated
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer

      person-deleted:
        connector: smallrye-kafka
        topic: person.v1.deleted
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer

      person-address-added:
        connector: smallrye-kafka
        topic: person.v1.address-added
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer

      person-address-updated:
        connector: smallrye-kafka
        topic: person.v1.address-updated
        value.serializer: org.apache.kafka.common.serialization.StringSerializer
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
