quarkus:
  application:
    name: person-service
    version: 1.0.0

  http:
    port: 9080

  smallrye-openapi:
    info-title: Person Service API
    info-version: 1.0.0
    info-description: REST API für Personenverwaltung (Hexagonal Architecture)
    info-contact-name: CSS Team
    path: /openapi

  swagger-ui:
    always-include: true
    path: /swagger-ui

  datasource:
    db-kind: postgresql

  hibernate-orm:
    schema-management:
      strategy: none # Use Flyway for migrations

  hibernate-envers:
    store-data-at-delete: true
    audit-table-suffix: _aud
    revision-field-name: rev
    revision-type-field-name: rev_type

  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    schemas: public
    table: flyway_schema_history
    locations: classpath:db/migration

  log:
    level: INFO

# Prod: explicit DB connection (env-var driven)
# Kafka publishing is handled by Debezium CDC reading the outbox table – no Kafka client needed here.
"%prod":
  quarkus:
    datasource:
      db-version: "12.0"
      username: ${DATABASE_USER:partner_user}
      password: ${DATABASE_PASSWORD:partner_pass}
      jdbc:
        url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/partner_db}
