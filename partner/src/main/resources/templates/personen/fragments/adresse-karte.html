<div class="card mb-2 border-{#if adresse.current}success{#else if adresse.preRecorded}info{#else}secondary{/if}" id="adresse-{adresse.addressId}">
  <div class="card-body p-3">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <span class="badge {#if adresse.current}bg-success{#else if adresse.preRecorded}bg-info{#else}bg-secondary{/if} me-1">
          {adresse.addressType}
        </span>
        <span class="text-muted small">{#if adresse.current}aktuell{#else if adresse.preRecorded}vorerfasst{#else}abgelaufen{/if}</span>
        <div class="mt-1 fw-semibold">{adresse.street} {adresse.houseNumber}, {adresse.postalCode} {adresse.city}</div>
        <small class="text-muted">
          Gültig: {adresse.validFrom} –
          {#if adresse.validTo}{adresse.validTo}{#else}∞{/if}
        </small>
      </div>
      <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-secondary"
                hx-get="/personen/fragments/{personId}/adressen/{adresse.addressId}/gueltigkeit"
                hx-target="#adresse-{adresse.addressId} .card-body"
                hx-swap="innerHTML">
          Gültigkeit
        </button>
        <button class="btn btn-outline-danger"
                hx-delete="/api/personen/{personId}/adressen/{adresse.addressId}"
                hx-confirm="Adresse löschen?"
                hx-target="#adresse-{adresse.addressId}"
                hx-swap="outerHTML">
          Löschen
        </button>
      </div>
    </div>
  </div>
</div>
