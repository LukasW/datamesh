<div id="personalien-form">
  {#if success}
  <div class="alert alert-success alert-dismissible">
    Personalien gespeichert.
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {/if}
  <form hx-put="/persons/fragments/{person.personId}/personal-data"
        hx-target="#personalien-form"
        hx-swap="outerHTML"
        hx-encoding="application/x-www-form-urlencoded">
    <div class="mb-2">
      <label class="form-label">Nachname</label>
      <input type="text" name="name" class="form-control" value="{person.name}" required>
    </div>
    <div class="mb-2">
      <label class="form-label">Vorname</label>
      <input type="text" name="firstName" class="form-control" value="{person.firstName}" required>
    </div>
    <div class="mb-2">
      <label class="form-label">Geschlecht</label>
      <select name="gender" class="form-select">
        <option value="MALE" {#if person.gender.name() == "MALE"}selected{/if}>Männlich</option>
        <option value="FEMALE"  {#if person.gender.name() == "FEMALE"}selected{/if}>Weiblich</option>
        <option value="DIVERSE"    {#if person.gender.name() == "DIVERSE"}selected{/if}>Divers</option>
      </select>
    </div>
    <div class="mb-2">
      <label class="form-label">Geburtsdatum</label>
      <input type="date" name="dateOfBirth" class="form-control"
             value="{person.dateOfBirth}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">AHV-Nummer <small class="text-muted">(optional)</small></label>
      {#if person.socialSecurityNumber}
      <input type="text" class="form-control" value="{person.socialSecurityNumber.formatted()}" readonly>
      {#else}
      <input type="text" class="form-control" placeholder="Nicht angegeben" readonly>
      {/if}
      <small class="text-muted">AHV-Nummer kann nach Ersterstellung nicht geändert werden.</small>
    </div>
    <button type="submit" class="btn btn-primary">Speichern</button>
  </form>
</div>
