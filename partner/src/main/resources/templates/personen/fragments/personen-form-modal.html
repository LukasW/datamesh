<div class="modal-header">
  <h5 class="modal-title">Neue Person erfassen</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
  <div id="person-form-errors"></div>
  <form id="person-neu-form"
        hx-post="/persons/fragments"
        hx-target="#personen-tabelle"
        hx-swap="afterbegin"
        hx-disabled-elt="find button[type='submit']"
        hx-indicator="#spinner-erstellen"
        hx-on::after-request="if(event.detail.successful) bootstrap.Modal.getInstance(document.getElementById('mainModal')).hide()"
        hx-on:htmx:response-error="document.getElementById('person-form-errors').innerHTML = event.detail.xhr.responseText">
    <div class="mb-2">
      <label class="form-label">Nachname <span class="text-danger">*</span></label>
      <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-2">
      <label class="form-label">Vorname <span class="text-danger">*</span></label>
      <input type="text" name="firstName" class="form-control" required>
    </div>
    <div class="mb-2">
      <label class="form-label">Geschlecht <span class="text-danger">*</span></label>
      <select name="gender" class="form-select" required>
        <option value="">– bitte wählen –</option>
        <option value="MALE">Männlich</option>
        <option value="FEMALE">Weiblich</option>
        <option value="DIVERSE">Divers</option>
      </select>
    </div>
    <div class="mb-2">
      <label class="form-label">Geburtsdatum <span class="text-danger">*</span></label>
      <input type="date" name="dateOfBirth" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">AHV-Nummer <small class="text-muted">(optional)</small></label>
      <input type="text" name="socialSecurityNumber" class="form-control"
             placeholder="756.XXXX.XXXX.XX">
    </div>
    <button type="submit" class="btn btn-primary">
      <span id="spinner-erstellen"
            class="htmx-indicator spinner-border spinner-border-sm me-1"
            role="status" aria-hidden="true"></span>
      Erstellen
    </button>
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
  </form>
</div>
