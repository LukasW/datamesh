<div class="p-1">
  <p class="fw-semibold mb-2">{adresse.addressType} — {adresse.street} {adresse.houseNumber}, {adresse.postalCode} {adresse.city}</p>
  <form hx-put="/persons/fragments/{personId}/addresses/{adresse.addressId}"
        hx-target="#adresse-{adresse.addressId}"
        hx-swap="outerHTML"
        hx-encoding="application/x-www-form-urlencoded">
    <div class="row g-2 mb-2">
      <div class="col-md-5">
        <label class="form-label small">Gültig von</label>
        <input type="date" name="validFrom" class="form-control form-control-sm"
               value="{adresse.validFrom}" required>
      </div>
      <div class="col-md-5">
        <label class="form-label small">Gültig bis <small class="text-muted">(leer = ∞)</small></label>
        <input type="date" name="validTo" class="form-control form-control-sm"
               value="{#if adresse.validTo}{adresse.validTo}{/if}">
      </div>
    </div>
    <button type="submit" class="btn btn-sm btn-primary">Speichern</button>
    <button type="button" class="btn btn-sm btn-secondary"
            hx-get="/persons/fragments/{personId}/addresses/{adresse.addressId}/card"
            hx-target="#adresse-{adresse.addressId}"
            hx-swap="outerHTML">
      Abbrechen
    </button>
  </form>
</div>
