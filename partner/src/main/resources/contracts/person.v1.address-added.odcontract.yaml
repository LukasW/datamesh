apiVersion: v1
kind: DataContract
metadata:
  name: person.v1.address-added
  version: "1.1.0"
  domain: partner
  description: Event published when an address is added to a person

spec:
  topic: person.v1.address-added
  format: AVRO
  schemaRegistry: http://schema-registry:8081
  schemaSubject: person.v1.address-added-value

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["AddressAdded"]
        nullable: false
      - name: personId
        type: string
        format: uuid
        nullable: false
      - name: addressId
        type: string
        format: uuid
        nullable: false
      - name: addressType
        type: string
        enum: ["RESIDENCE", "CORRESPONDENCE", "DELIVERY"]
        nullable: false
      - name: street
        type: string
        nullable: false
      - name: houseNumber
        type: string
        nullable: false
      - name: postalCode
        type: string
        nullable: false
      - name: city
        type: string
        nullable: false
      - name: land
        type: string
        nullable: false
      - name: validFrom
        type: string
        format: date
        description: ISO-8601 (yyyy-MM-dd)
        nullable: false
      - name: validTo
        type: string
        format: date
        description: ISO-8601 (yyyy-MM-dd). Null means open-ended validity.
        nullable: true
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for person.v1.address-added:
          - not_null:
              columns: [eventId, eventType, personId, addressId, addressType, street, houseNumber, postalCode, city, land, validFrom, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

dataProduct:
  owner: team-partner@css.ch
  domain: partner
  outputPort: kafka
  sla:
    freshness: 5m
    availability: "99.9%"
    qualityScore: 0.98
  tags:
    - pii
    - gdpr-subject
