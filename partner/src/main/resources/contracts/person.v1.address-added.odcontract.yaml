apiVersion: v1
kind: DataContract
metadata:
  name: person.v1.address-added
  version: "1.0.0"
  domain: partner
  description: Event published when an address is added to a person

spec:
  topic: person.v1.address-added
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["AdresseHinzugefuegt"]
        nullable: false
      - name: personId
        type: string
        format: uuid
        nullable: false
      - name: adressId
        type: string
        format: uuid
        nullable: false
      - name: adressTyp
        type: string
        enum: ["WOHNADRESSE", "KORRESPONDENZADRESSE", "ZUSTELLADRESSE"]
        nullable: false
      - name: gueltigVon
        type: string
        format: date
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for person.v1.address-added:
          - not_null:
              columns: [eventId, eventType, personId, adressId, adressTyp, gueltigVon, timestamp]
          - no_duplicate_rows:
              columns: [eventId]
