apiVersion: v1
kind: DataContract
metadata:
  name: person.v1.address-updated
  version: "1.1.0"
  domain: partner
  description: Event published when an address validity period (validFrom/validTo) is updated

spec:
  topic: person.v1.address-updated
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["AddressUpdated"]
        nullable: false
      - name: personId
        type: string
        format: uuid
        nullable: false
      - name: addressId
        type: string
        format: uuid
        nullable: false
      - name: validFrom
        type: string
        format: date
        description: ISO-8601 (yyyy-MM-dd)
        nullable: false
      - name: validTo
        type: string
        format: date
        description: ISO-8601 (yyyy-MM-dd) – \"null\" string means open-ended
        nullable: true
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for person.v1.address-updated:
          - not_null:
              columns: [eventId, eventType, personId, addressId, validFrom, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

dataProduct:
  owner: team-partner@css.ch
  domain: partner
  outputPort: kafka
  sla:
    freshness: 5m
    availability: "99.9%"
    qualityScore: 0.98
  tags:
    - pii
    - gdpr-subject
  accessPatterns:
    - type: kafka-consumer
      description: "Subscribe to the topic for real-time event processing"
      protocol: kafka
      config:
        bootstrap.servers: "${KAFKA_BOOTSTRAP_SERVERS}"
        group.id: "${CONSUMER_GROUP_ID}"
        auto.offset.reset: earliest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
