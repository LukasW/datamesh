apiVersion: v1
kind: DataContract
metadata:
  name: person.v1.address-updated
  version: "1.0.0"
  domain: partner
  description: Event published when an address validity period (gueltigVon/gueltigBis) is updated

spec:
  topic: person.v1.address-updated
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["AdresseAktualisiert"]
        nullable: false
      - name: personId
        type: string
        format: uuid
        nullable: false
      - name: adressId
        type: string
        format: uuid
        nullable: false
      - name: gueltigVon
        type: string
        format: date
        nullable: false
      - name: gueltigBis
        type: string
        format: date
        nullable: true
        description: "null = unbefristet gültig"
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for person.v1.address-updated:
          - not_null:
              columns: [eventId, eventType, personId, adressId, gueltigVon, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

