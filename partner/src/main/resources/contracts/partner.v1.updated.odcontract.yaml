apiVersion: v2.3.0
kind: DataContract
id: partner-updated-v1
version: 1.0.0

info:
  title: Partner Updated Event
  description: Published when a partner/customer record is updated
  owner: partner-team@insurance.example.com
  domain: partner
  tags: ["partner", "update", "core"]
  contact:
    email: partner-team@insurance.example.com
  sla:
    freshness: "< 5 minutes"
    availability: "99.9%"
    qualityScore: 0.95

servers:
  production:
    type: kafka
    host: kafka.insurance.internal:9092
    topic: partner.v1.updated
  development:
    type: kafka
    host: localhost:9092
    topic: partner.v1.updated

schema:
  type: json
  specification: |
    {
      "type": "record",
      "name": "PartnerUpdated",
      "namespace": "ch.css.partner.events",
      "fields": [
        {
          "name": "eventId",
          "type": "string",
          "doc": "Unique event identifier (UUID)"
        },
        {
          "name": "eventType",
          "type": "string",
          "doc": "Event type (PartnerUpdated)"
        },
        {
          "name": "partnerId",
          "type": "string",
          "doc": "Unique partner identifier (UUID)"
        },
        {
          "name": "name",
          "type": "string",
          "doc": "Updated partner/customer name"
        },
        {
          "name": "timestamp",
          "type": "string",
          "doc": "ISO 8601 timestamp when event was created"
        }
      ]
    }

quality:
  type: SodaCL
  specification: |
    checks for partner.v1.updated:
      - missing_count(partnerId) = 0
      - missing_count(eventId) = 0

serviceLevel:
  availability: "99.9%"
  retention: "7 years"
  latency: "< 500ms p99"

dataProduct:
  accessPatterns:
    - type: kafka-consumer
      description: "Subscribe to the topic for real-time event processing"
      protocol: kafka
      config:
        bootstrap.servers: "${KAFKA_BOOTSTRAP_SERVERS}"
        group.id: "${CONSUMER_GROUP_ID}"
        auto.offset.reset: earliest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer

changelog:
  - version: "1.0.0"
    date: "2026-03-12"
    description: "Initial version - Partner update event"
