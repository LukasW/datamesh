apiVersion: v2.3.0
kind: DataContract
id: partner-created-v1
version: 1.0.0

info:
  title: Partner Created Event
  description: Published when a new partner/customer is created
  owner: partner-team@insurance.example.com
  domain: partner
  tags: ["partner", "create", "core"]
  contact:
    email: partner-team@insurance.example.com
  sla:
    freshness: "< 5 minutes"
    availability: "99.9%"
    qualityScore: 0.95

servers:
  production:
    type: kafka
    host: kafka.insurance.internal:9092
    topic: partner.v1.created
  development:
    type: kafka
    host: localhost:9092
    topic: partner.v1.created

schema:
  type: avro
  specification: |
    {
      "type": "record",
      "name": "PartnerCreated",
      "namespace": "ch.css.partner.events",
      "fields": [
        {
          "name": "eventId",
          "type": "string",
          "doc": "Unique event identifier (UUID)"
        },
        {
          "name": "eventType",
          "type": "string",
          "doc": "Event type (PartnerCreated)"
        },
        {
          "name": "partnerId",
          "type": "string",
          "doc": "Unique partner identifier (UUID)"
        },
        {
          "name": "name",
          "type": "string",
          "doc": "Partner/customer name"
        },
        {
          "name": "partnerType",
          "type": {
            "type": "enum",
            "name": "PartnerType",
            "symbols": ["CUSTOMER", "BROKER", "AGENT", "SUPPLIER"]
          },
          "doc": "Type of partner"
        },
        {
          "name": "timestamp",
          "type": "string",
          "doc": "ISO 8601 timestamp when event was created"
        }
      ]
    }

quality:
  type: SodaCL
  specification: |
    checks for partner.v1.created:
      - missing_count(partnerId) = 0
      - missing_count(eventId) = 0
      - duplicate_count(partnerId) = 0
      - duplicate_count(eventId) = 0

serviceLevel:
  availability: "99.9%"
  retention: "7 years"
  latency: "< 500ms p99"
  throughput: "1000 events/sec"
  backupRecovery: "24 hours RTO"

changelog:
  - version: "1.0.0"
    date: "2026-03-12"
    description: "Initial version - Partner creation event"
