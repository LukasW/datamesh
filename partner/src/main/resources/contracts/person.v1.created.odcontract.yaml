apiVersion: v1
kind: DataContract
metadata:
  name: person.v1.created
  version: "1.1.0"
  domain: partner
  description: Event published when a new natural person is created

spec:
  topic: person.v1.created
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["PersonCreated"]
        nullable: false
      - name: personId
        type: string
        format: uuid
        nullable: false
      - name: name
        type: string
        nullable: false
      - name: firstName
        type: string
        nullable: false
      - name: socialSecurityNumber
        type: string
        description: "Formatted: 756.XXXX.XXXX.XX – null if not provided"
        nullable: true
      - name: dateOfBirth
        type: string
        format: date
        description: ISO-8601 (yyyy-MM-dd)
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for person.v1.created:
          - not_null:
              columns: [eventId, eventType, personId, name, firstName, dateOfBirth, timestamp]
          - no_duplicate_rows:
              columns: [eventId]
