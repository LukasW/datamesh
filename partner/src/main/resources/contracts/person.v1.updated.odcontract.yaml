apiVersion: v1
kind: DataContract
metadata:
  name: person.v1.updated
  version: "1.0.0"
  domain: partner
  description: Event published when a person's personal data (Personalien) is updated

spec:
  topic: person.v1.updated
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["PersonUpdated"]
        nullable: false
      - name: personId
        type: string
        format: uuid
        nullable: false
      - name: name
        type: string
        nullable: false
      - name: vorname
        type: string
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for person.v1.updated:
          - not_null:
              columns: [eventId, eventType, personId, name, vorname, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

