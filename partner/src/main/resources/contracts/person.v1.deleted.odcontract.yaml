apiVersion: v1
kind: DataContract
metadata:
  name: person.v1.deleted
  version: "1.0.0"
  domain: partner
  description: Event published when a person is deleted (physical delete with cascade)

spec:
  topic: person.v1.deleted
  format: JSON

  schema:
    fields:
      - name: eventId
        type: string
        format: uuid
        nullable: false
      - name: eventType
        type: string
        enum: ["PersonDeleted"]
        nullable: false
      - name: personId
        type: string
        format: uuid
        nullable: false
      - name: timestamp
        type: string
        format: datetime
        nullable: false

  quality:
    - type: SodaCL
      checks: |
        checks for person.v1.deleted:
          - not_null:
              columns: [eventId, eventType, personId, timestamp]
          - no_duplicate_rows:
              columns: [eventId]

dataProduct:
  owner: team-partner@yuno.ch
  domain: partner
  outputPort: kafka
  sla:
    freshness: 5m
    availability: "99.9%"
    qualityScore: 0.98
  tags:
    - pii
    - gdpr-subject
  accessPatterns:
    - type: kafka-consumer
      description: "Subscribe to the topic for real-time event processing"
      protocol: kafka
      config:
        bootstrap.servers: "${KAFKA_BOOTSTRAP_SERVERS}"
        group.id: "${CONSUMER_GROUP_ID}"
        auto.offset.reset: earliest
        key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
